[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/utils/**"]

# ── API → Netlify Functions ──────────────────────────────────
[[redirects]]
  from = "/api/auth"
  to   = "/.netlify/functions/auth"
  status = 200
  force  = true

[[redirects]]
  from = "/api/auth/*"
  to   = "/.netlify/functions/auth"
  status = 200
  force  = true

[[redirects]]
  from = "/api/chat"
  to   = "/.netlify/functions/chat"
  status = 200
  force  = true

[[redirects]]
  from = "/api/chat/*"
  to   = "/.netlify/functions/chat"
  status = 200
  force  = true

[[redirects]]
  from = "/api/payment"
  to   = "/.netlify/functions/payment"
  status = 200
  force  = true

[[redirects]]
  from = "/api/payment/*"
  to   = "/.netlify/functions/payment"
  status = 200
  force  = true

[[redirects]]
  from = "/api/admin"
  to   = "/.netlify/functions/admin"
  status = 200
  force  = true

[[redirects]]
  from = "/api/admin/*"
  to   = "/.netlify/functions/admin"
  status = 200
  force  = true

# ── Page Routes (Pretty URLs) ────────────────────────────────
[[redirects]]
  from = "/auth"
  to   = "/auth.html"
  status = 200

[[redirects]]
  from = "/chat"
  to   = "/chat.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to   = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/checkout"
  to   = "/checkout.html"
  status = 200

[[redirects]]
  from = "/tools"
  to   = "/tools.html"
  status = 200

[[redirects]]
  from = "/games"
  to   = "/games.html"
  status = 200

[[redirects]]
  from = "/leaderboard"
  to   = "/leaderboard.html"
  status = 200

[[redirects]]
  from = "/admin"
  to   = "/admin.html"
  status = 200

[[redirects]]
  from = "/admin-login"
  to   = "/admin-login.html"
  status = 200
