<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — KizAi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080E;--bg2:#0D0D14;--bg3:#12121A;--card:#161621;--card2:#1C1C28;--lime:#D4FF47;--lime2:#BFEF2A;--hot:#FF3C68;--cyan:#00D9FF;--violet:#7B5EA7;--indigo:#5B5FEE;--green:#2ECC71;--white:#F4F4FF;--gray:#9898B0;--gray2:#5A5A70;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);--border-lime:rgba(212,255,71,.2);--ff-d:'Syne',sans-serif;--ff-b:'Plus Jakarta Sans',sans-serif;--ff-m:'JetBrains Mono',monospace}
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--white);font-family:var(--ff-b);display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit}

/* ANIMATED BACKGROUND */
.auth-bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(120px);animation:orbFloat 8s ease-in-out infinite}
.orb1{width:500px;height:500px;background:rgba(212,255,71,.08);top:-150px;right:-100px;animation-delay:0s}
.orb2{width:400px;height:400px;background:rgba(91,95,238,.08);bottom:-100px;left:-100px;animation-delay:-3s}
.orb3{width:300px;height:300px;background:rgba(0,217,255,.04);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-5s}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.05)}}
.orb3{animation:orbFloat3 10s ease-in-out infinite}
@keyframes orbFloat3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-55%) scale(1.08)}}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,#000 40%,transparent 100%)}
.bg-particles{position:absolute;inset:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;animation:particleDrift linear infinite}
@keyframes particleDrift{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-20px) rotate(360deg);opacity:0}}

/* NAV */
nav{position:relative;z-index:10;padding:1.25rem 5vw;display:flex;align-items:center;justify-content:space-between}
.brand{font-family:var(--ff-d);font-weight:800;font-size:1.2rem;display:flex;align-items:center;gap:.4rem;transition:opacity .2s}
.brand:hover{opacity:.8}
.brand-dot{width:8px;height:8px;background:var(--lime);border-radius:50%;display:inline-block;box-shadow:0 0 8px var(--lime);animation:pulseDot 2s infinite}
@keyframes pulseDot{0%,100%{box-shadow:0 0 8px var(--lime)}50%{box-shadow:0 0 16px var(--lime),0 0 24px rgba(212,255,71,.3)}}
.nav-back{font-size:.82rem;color:var(--gray);display:flex;align-items:center;gap:.35rem;transition:color .2s;padding:.4rem .8rem;border-radius:7px;border:1px solid var(--border)}
.nav-back:hover{color:var(--white);border-color:var(--border2)}

/* AUTH CARD */
.auth-wrap{position:relative;z-index:5;flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.auth-card{width:100%;max-width:430px;background:var(--card);border:1px solid var(--border2);border-radius:22px;padding:2.5rem;box-shadow:0 40px 100px rgba(0,0,0,.6);animation:cardIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardIn{from{transform:translateY(20px) scale(.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.auth-logo{text-align:center;margin-bottom:2rem}
.ai-badge{display:inline-flex;align-items:center;gap:.5rem;padding:.35rem .9rem;border-radius:100px;border:1px solid var(--border-lime);background:rgba(212,255,71,.06);font-family:var(--ff-m);font-size:.72rem;color:var(--lime);margin-bottom:.75rem;animation:badgeGlow 3s ease-in-out infinite}
@keyframes badgeGlow{0%,100%{box-shadow:0 0 0 rgba(212,255,71,0)}50%{box-shadow:0 0 16px rgba(212,255,71,.12)}}
.auth-logo h1{font-family:var(--ff-d);font-weight:800;font-size:1.75rem;letter-spacing:-.04em}
.auth-logo p{font-size:.82rem;color:var(--gray);margin-top:.3rem}

/* TABS */
.auth-tabs{display:flex;border-radius:10px;background:var(--bg3);padding:3px;margin-bottom:2rem;gap:2px;position:relative}
.tab{flex:1;padding:.55rem;border-radius:8px;text-align:center;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .25s;color:var(--gray);border:none;background:transparent;font-family:inherit}
.tab.on{background:var(--card2);color:var(--white);box-shadow:0 2px 8px rgba(0,0,0,.3)}

/* FORM */
.form-group{margin-bottom:1.1rem}
.fl{font-family:var(--ff-m);font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gray2);display:block;margin-bottom:.45rem}
.fi-wrap{position:relative}
.fi{width:100%;padding:.82rem 1rem .82rem 2.75rem;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--white);font-size:.88rem;font-family:inherit;outline:none;transition:border-color .25s,box-shadow .25s}
.fi:focus{border-color:rgba(212,255,71,.45);box-shadow:0 0 0 3px rgba(212,255,71,.07)}
.fi.err{border-color:rgba(255,60,104,.45)}
.fi-icon{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);font-size:1rem;color:var(--gray2);pointer-events:none}
.fi-eye{position:absolute;right:.85rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray2);cursor:pointer;font-size:.9rem;padding:0;line-height:1;transition:color .2s}
.fi-eye:hover{color:var(--gray)}
.err-msg{font-size:.72rem;color:var(--hot);margin-top:.3rem;display:none}

/* FORGOT */
.form-aux{display:flex;justify-content:flex-end;margin-top:-.5rem;margin-bottom:.75rem}
.form-aux a{font-size:.75rem;color:var(--gray2);transition:color .2s}
.form-aux a:hover{color:var(--lime)}

/* SUBMIT BTN */
.btn-auth{width:100%;padding:.9rem;border-radius:10px;font-family:var(--ff-d);font-size:1rem;font-weight:700;letter-spacing:-.01em;background:var(--lime);color:var(--bg);border:none;cursor:pointer;transition:all .3s;margin-top:.5rem;position:relative;overflow:hidden}
.btn-auth::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transform:translateX(-100%);transition:transform .5s}
.btn-auth:hover::before{transform:translateX(100%)}
.btn-auth:hover:not(:disabled){background:var(--lime2);transform:translateY(-2px);box-shadow:0 12px 36px rgba(212,255,71,.25)}
.btn-auth:disabled{opacity:.6;transform:none;cursor:not-allowed}
.btn-auth .btn-spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(8,8,14,.3);border-top-color:var(--bg);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:.4rem;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:.75rem;margin:1.5rem 0;color:var(--gray2);font-size:.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* TERMS */
.terms{font-size:.73rem;color:var(--gray2);text-align:center;margin-top:1.25rem;line-height:1.6}
.terms a{color:var(--lime);text-decoration:underline}

/* TOAST */
.toast-stack{position:fixed;top:1rem;right:1rem;z-index:999;display:flex;flex-direction:column;gap:.4rem;pointer-events:none}
.toast{padding:.7rem 1.1rem;border-radius:9px;font-size:.82rem;font-weight:600;animation:t-in .3s ease;display:flex;align-items:center;gap:.5rem;box-shadow:0 8px 32px rgba(0,0,0,.5);pointer-events:auto;max-width:320px}
.toast.ok{background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.25);color:#2ECC71}
.toast.err{background:rgba(255,60,104,.1);border:1px solid rgba(255,60,104,.25);color:var(--hot)}
.toast.info{background:rgba(212,255,71,.08);border:1px solid var(--border-lime);color:var(--lime)}
@keyframes t-in{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes t-out{to{transform:translateX(24px);opacity:0}}

/* STRENGTH METER */
.pw-meter{height:3px;border-radius:2px;background:var(--border);margin-top:.5rem;overflow:hidden}
.pw-bar{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
.pw-label{font-family:var(--ff-m);font-size:.6rem;color:var(--gray2);margin-top:.25rem;transition:color .2s}

/* SOCIAL PROOF */
.social-proof{display:flex;align-items:center;gap:.6rem;justify-content:center;margin-top:1.75rem;font-size:.75rem;color:var(--gray2);padding-top:1.25rem;border-top:1px solid var(--border)}
.proof-avatars{display:flex}
.pa{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--bg);font-size:.7rem;display:flex;align-items:center;justify-content:center;font-weight:700;margin-left:-6px}
.pa:first-child{margin-left:0}

/* SUCCESS STATE */
.auth-success{text-align:center;padding:1rem 0;display:none}
.suc-icon{font-size:3.5rem;animation:bounceIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes bounceIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

@media(max-width:480px){
  .auth-card{padding:2rem 1.5rem;border-radius:16px}
}
</style>
</head>
<body>

<div class="auth-bg">
  <div class="bg-grid"></div>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>
  <div class="bg-particles" id="particles"></div>
</div>

<div class="toast-stack" id="toasts"></div>

<nav>
  <a href="/" class="brand"><span class="brand-dot"></span>KizAi</a>
  <a href="/" class="nav-back">← Beranda</a>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="ai-badge">⚡ KizAi · AI Platform</div>
      <h1>Selamat Datang</h1>
      <p>Masuk atau buat akun baru untuk lanjut</p>
    </div>

    <div class="auth-tabs">
      <button class="tab on" id="tab-login" onclick="switchTab('login')">Masuk</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Daftar</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="form-group">
        <label class="fl">Username / Email</label>
        <div class="fi-wrap">
          <span class="fi-icon">👤</span>
          <input class="fi" id="l-user" type="text" placeholder="username atau email" autocomplete="username" autofocus>
        </div>
        <span class="err-msg" id="l-user-err"></span>
      </div>
      <div class="form-group">
        <label class="fl">Password</label>
        <div class="fi-wrap">
          <span class="fi-icon">🔒</span>
          <input class="fi" id="l-pass" type="password" placeholder="password kamu" autocomplete="current-password">
          <button class="fi-eye" onclick="togglePW('l-pass',this)" type="button">👁</button>
        </div>
        <span class="err-msg" id="l-pass-err"></span>
      </div>
      <div class="form-aux"><a href="#" onclick="toast('Reset password via admin atau Telegram @nexdev_bot','info');return false">Lupa password?</a></div>
      <button class="btn-auth" id="btn-login" onclick="doLogin()">
        <span class="btn-spinner" id="login-spinner"></span>
        Masuk →
      </button>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label class="fl">Username *</label>
        <div class="fi-wrap">
          <span class="fi-icon">👤</span>
          <input class="fi" id="r-user" type="text" placeholder="min 3 karakter, huruf & angka" autocomplete="username" oninput="validateUsername()">
        </div>
        <span class="err-msg" id="r-user-err"></span>
      </div>
      <div class="form-group">
        <label class="fl">Email *</label>
        <div class="fi-wrap">
          <span class="fi-icon">📧</span>
          <input class="fi" id="r-email" type="email" placeholder="email@kamu.com" autocomplete="email">
        </div>
        <span class="err-msg" id="r-email-err"></span>
      </div>
      <div class="form-group">
        <label class="fl">Password *</label>
        <div class="fi-wrap">
          <span class="fi-icon">🔒</span>
          <input class="fi" id="r-pass" type="password" placeholder="min 6 karakter" autocomplete="new-password" oninput="checkPWStrength()">
          <button class="fi-eye" onclick="togglePW('r-pass',this)" type="button">👁</button>
        </div>
        <div class="pw-meter"><div class="pw-bar" id="pw-bar"></div></div>
        <div class="pw-label" id="pw-label"></div>
        <span class="err-msg" id="r-pass-err"></span>
      </div>
      <div class="form-group">
        <label class="fl">ID Telegram <span style="color:var(--gray2)">(opsional)</span></label>
        <div class="fi-wrap">
          <span class="fi-icon">✈️</span>
          <input class="fi" id="r-tg" type="text" placeholder="@username atau ID numerik" autocomplete="off">
        </div>
      </div>
      <button class="btn-auth" id="btn-register" onclick="doRegister()">
        <span class="btn-spinner" id="reg-spinner"></span>
        Buat Akun →
      </button>
      <div class="terms">Dengan mendaftar kamu menyetujui <a href="#">Terms of Service</a> dan <a href="#">Privacy Policy</a> KizAi.</div>
    </div>

    <div class="social-proof">
      <div class="proof-avatars">
        <div class="pa" style="background:#5B5FEE">A</div>
        <div class="pa" style="background:#D4FF47;color:#08080E">B</div>
        <div class="pa" style="background:#7B5EA7">C</div>
        <div class="pa" style="background:#00D9FF;color:#08080E">D</div>
        <div class="pa" style="background:#FF3C68">+</div>
      </div>
      <span>2.500+ pengguna aktif sudah bergabung</span>
    </div>
  </div>
</div>

<script>
const API = '/api/auth';

// ── PARTICLES ──────────────────────────────────────────────────
(function() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 15; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    const size = Math.random() * 3 + 1;
    el.style.cssText = `width:${size}px;height:${size}px;background:rgba(212,255,71,${Math.random()*.15+.05});left:${Math.random()*100}%;animation-duration:${Math.random()*15+10}s;animation-delay:-${Math.random()*15}s`;
    container.appendChild(el);
  }
})();

// ── TAB SWITCH ─────────────────────────────────────────────────
function switchTab(t) {
  document.getElementById('tab-login').classList.toggle('on', t === 'login');
  document.getElementById('tab-register').classList.toggle('on', t === 'register');
  document.getElementById('login-form').style.display = t === 'login' ? '' : 'none';
  document.getElementById('register-form').style.display = t === 'register' ? '' : 'none';
  history.replaceState(null, '', '#' + t);
  // Focus first input
  setTimeout(() => {
    const inp = t === 'login' ? document.getElementById('l-user') : document.getElementById('r-user');
    if (inp) inp.focus();
  }, 50);
}
if (location.hash === '#register') switchTab('register');

// ── AUTO-REDIRECT IF LOGGED IN ─────────────────────────────────
const existingToken = localStorage.getItem('kizai_token');
if (existingToken) {
  fetch(`${API}?action=me`, { headers: { 'Authorization': 'Bearer ' + existingToken } })
    .then(r => r.json())
    .then(d => { if (d.user) window.location.href = '/dashboard.html'; })
    .catch(() => {});
}

// ── TOGGLE PASSWORD ────────────────────────────────────────────
function togglePW(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

// ── VALIDATE USERNAME ──────────────────────────────────────────
function validateUsername() {
  const v = document.getElementById('r-user').value;
  const err = document.getElementById('r-user-err');
  if (v.length > 0 && v.length < 3) { showErr(err, 'Min 3 karakter'); }
  else if (v.length > 0 && !/^[a-zA-Z0-9_]+$/.test(v)) { showErr(err, 'Hanya huruf, angka, underscore'); }
  else hideErr(err);
}

// ── PASSWORD STRENGTH ──────────────────────────────────────────
function checkPWStrength() {
  const pw = document.getElementById('r-pass').value;
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/\d/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const bar = document.getElementById('pw-bar');
  const label = document.getElementById('pw-label');
  const widths = [0, 20, 40, 65, 85, 100];
  const colors = ['transparent', '#FF3C68', '#FFB830', '#FFB830', '#2ECC71', '#D4FF47'];
  const labels = ['', 'Sangat Lemah', 'Lemah', 'Cukup', 'Kuat', 'Sangat Kuat'];
  bar.style.width = widths[score] + '%';
  bar.style.background = colors[score];
  label.textContent = labels[score];
  label.style.color = colors[score];
}

function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }
function hideErr(el) { el.style.display = 'none'; }

// ── LOGIN ──────────────────────────────────────────────────────
async function doLogin() {
  const btn = document.getElementById('btn-login');
  const spinner = document.getElementById('login-spinner');
  const identifier = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value;

  // Clear errors
  document.querySelectorAll('#login-form .err-msg').forEach(e => hideErr(e));

  if (!identifier) { showErr(document.getElementById('l-user-err'), 'Field wajib diisi'); return; }
  if (!password) { showErr(document.getElementById('l-pass-err'), 'Field wajib diisi'); return; }

  btn.disabled = true;
  spinner.style.display = 'inline-block';
  btn.childNodes[btn.childNodes.length - 1].textContent = ' Masuk...';

  try {
    // BUG FIX: Send "identifier" field (not "username") to match API
    const r = await fetch(`${API}?action=login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ identifier, password })
    });
    const d = await r.json();
    if (!r.ok) {
      toast(d.error || 'Login gagal', 'err');
      btn.disabled = false;
      spinner.style.display = 'none';
      btn.childNodes[btn.childNodes.length - 1].textContent = ' Masuk →';
      return;
    }
    // BUG FIX: API returns "access_token" not "token"
    localStorage.setItem('kizai_token', d.access_token);
    localStorage.setItem('kizai_user', JSON.stringify(d.user));
    toast('Login berhasil! 🎉', 'ok');
    setTimeout(() => {
      if (d.user?.role === 'admin') {
        window.location.href = '/admin.html';
      } else {
        window.location.href = '/dashboard.html';
      }
    }, 700);
  } catch(e) {
    toast('Koneksi error. Coba lagi.', 'err');
    btn.disabled = false;
    spinner.style.display = 'none';
    btn.childNodes[btn.childNodes.length - 1].textContent = ' Masuk →';
  }
}

// ── REGISTER ───────────────────────────────────────────────────
async function doRegister() {
  const btn = document.getElementById('btn-register');
  const spinner = document.getElementById('reg-spinner');
  const username = document.getElementById('r-user').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const password = document.getElementById('r-pass').value;
  const telegram_id = document.getElementById('r-tg').value.trim();

  // Clear errors
  document.querySelectorAll('#register-form .err-msg').forEach(e => hideErr(e));
  let hasErr = false;

  if (!username) { showErr(document.getElementById('r-user-err'), 'Field wajib diisi'); hasErr = true; }
  else if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) { showErr(document.getElementById('r-user-err'), 'Username 3-20 karakter (huruf/angka/underscore)'); hasErr = true; }
  if (!email || !email.includes('@')) { showErr(document.getElementById('r-email-err'), 'Email tidak valid'); hasErr = true; }
  if (!password || password.length < 6) { showErr(document.getElementById('r-pass-err'), 'Password minimal 6 karakter'); hasErr = true; }
  if (hasErr) return;

  btn.disabled = true;
  spinner.style.display = 'inline-block';
  btn.childNodes[btn.childNodes.length - 1].textContent = ' Mendaftar...';

  try {
    const r = await fetch(`${API}?action=register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password, telegram_id })
    });
    const d = await r.json();

    if (!r.ok) {
      toast(d.error || 'Gagal daftar', 'err');
      btn.disabled = false;
      spinner.style.display = 'none';
      btn.childNodes[btn.childNodes.length - 1].textContent = ' Buat Akun →';
      return;
    }

    // BUG FIX: Handle both cases - auto-login (has access_token) or manual login required
    if (d.access_token) {
      localStorage.setItem('kizai_token', d.access_token);
      localStorage.setItem('kizai_user', JSON.stringify(d.user));
      toast('Akun berhasil dibuat! 🎉 Selamat datang!', 'ok');
      setTimeout(() => window.location.href = '/dashboard.html', 900);
    } else {
      // Email confirmation required - redirect to login
      toast('Akun dibuat! Silakan login.', 'ok');
      setTimeout(() => switchTab('login'), 1500);
      btn.disabled = false;
      spinner.style.display = 'none';
      btn.childNodes[btn.childNodes.length - 1].textContent = ' Buat Akun →';
    }
  } catch(e) {
    toast('Koneksi error. Coba lagi.', 'err');
    btn.disabled = false;
    spinner.style.display = 'none';
    btn.childNodes[btn.childNodes.length - 1].textContent = ' Buat Akun →';
  }
}

// ── TOAST ──────────────────────────────────────────────────────
function toast(msg, type = 'ok', duration = 3500) {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  const icons = { ok: '✅', err: '❌', info: '💡' };
  el.innerHTML = `<span>${icons[type]||''}</span><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(() => {
    el.style.animation = 't-out .3s ease forwards';
    setTimeout(() => el.remove(), 300);
  }, duration);
}

// ── ENTER KEY ──────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('login-form').style.display !== 'none') doLogin();
    else doRegister();
  }
});
