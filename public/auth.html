<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — KizAi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080E;--bg2:#0D0D14;--bg3:#12121A;--card:#161621;--card2:#1C1C28;--lime:#D4FF47;--lime2:#BFEF2A;--hot:#FF3C68;--cyan:#00D9FF;--violet:#7B5EA7;--indigo:#5B5FEE;--green:#2ECC71;--white:#F4F4FF;--gray:#9898B0;--gray2:#5A5A70;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);--border-lime:rgba(212,255,71,.2);--ff-d:'Syne',sans-serif;--ff-b:'Plus Jakarta Sans',sans-serif;--ff-m:'JetBrains Mono',monospace}
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--white);font-family:var(--ff-b);display:flex;flex-direction:column;min-height:100vh}
a{text-decoration:none;color:inherit}

/* BACKGROUND */
.auth-bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(120px)}
.orb1{width:500px;height:500px;background:rgba(212,255,71,.06);top:-100px;right:-100px}
.orb2{width:400px;height:400px;background:rgba(91,95,238,.07);bottom:-100px;left:-100px}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,#000 40%,transparent 100%)}

/* NAV */
nav{position:relative;z-index:10;padding:1.25rem 5vw;display:flex;align-items:center;justify-content:space-between}
.brand{font-family:var(--ff-d);font-weight:800;font-size:1.2rem;display:flex;align-items:center;gap:.4rem}
.brand-dot{width:8px;height:8px;background:var(--lime);border-radius:50%;display:inline-block}
.nav-back{font-size:.82rem;color:var(--gray);display:flex;align-items:center;gap:.35rem;transition:color .2s}
.nav-back:hover{color:var(--white)}

/* AUTH CARD */
.auth-wrap{position:relative;z-index:5;flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.auth-card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:2.5rem;box-shadow:0 40px 100px rgba(0,0,0,.5)}
.auth-logo{text-align:center;margin-bottom:2rem}
.auth-logo .ai-badge{display:inline-flex;align-items:center;gap:.5rem;padding:.35rem .9rem;border-radius:100px;border:1px solid var(--border-lime);background:rgba(212,255,71,.06);font-family:var(--ff-m);font-size:.72rem;color:var(--lime);margin-bottom:.75rem}
.auth-logo h1{font-family:var(--ff-d);font-weight:800;font-size:1.75rem;letter-spacing:-.04em}
.auth-logo p{font-size:.82rem;color:var(--gray);margin-top:.3rem}

/* TABS */
.auth-tabs{display:flex;border-radius:10px;background:var(--bg3);padding:3px;margin-bottom:2rem;gap:2px}
.tab{flex:1;padding:.55rem;border-radius:8px;text-align:center;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .25s;color:var(--gray);border:none;background:transparent;font-family:inherit}
.tab.on{background:var(--card2);color:var(--white);box-shadow:0 2px 8px rgba(0,0,0,.3)}

/* FORM */
.form-group{margin-bottom:1.1rem}
.fl{font-family:var(--ff-m);font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gray2);display:block;margin-bottom:.45rem}
.fi-wrap{position:relative}
.fi{width:100%;padding:.82rem 1rem .82rem 2.75rem;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--white);font-size:.88rem;font-family:inherit;outline:none;transition:border-color .25s,box-shadow .25s}
.fi:focus{border-color:rgba(212,255,71,.45);box-shadow:0 0 0 3px rgba(212,255,71,.07)}
.fi.err{border-color:rgba(255,60,104,.45)}
.fi-icon{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);font-size:1rem;color:var(--gray2);pointer-events:none}
.fi-eye{position:absolute;right:.85rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray2);cursor:pointer;font-size:.9rem;padding:0;line-height:1}
.fi-eye:hover{color:var(--gray)}
.err-msg{font-size:.72rem;color:var(--hot);margin-top:.3rem;display:none}

/* FORGOT */
.form-aux{display:flex;justify-content:flex-end;margin-top:-.5rem;margin-bottom:.75rem}
.form-aux a{font-size:.75rem;color:var(--gray2);transition:color .2s}
.form-aux a:hover{color:var(--lime)}

/* SUBMIT */
.btn-auth{width:100%;padding:.9rem;border-radius:10px;font-family:var(--ff-d);font-size:1rem;font-weight:700;letter-spacing:-.01em;background:var(--lime);color:var(--bg);border:none;cursor:pointer;transition:all .3s;margin-top:.5rem}
.btn-auth:hover{background:var(--lime2);transform:translateY(-2px);box-shadow:0 12px 36px rgba(212,255,71,.2)}
.btn-auth:disabled{opacity:.6;transform:none;cursor:not-allowed}
.btn-auth.loading::after{content:' ⏳'}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:.75rem;margin:1.5rem 0;color:var(--gray2);font-size:.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* TERMS */
.terms{font-size:.73rem;color:var(--gray2);text-align:center;margin-top:1.25rem;line-height:1.6}
.terms a{color:var(--lime);text-decoration:underline}

/* TOAST */
.toast-stack{position:fixed;top:1rem;right:1rem;z-index:999;display:flex;flex-direction:column;gap:.4rem;pointer-events:none}
.toast{padding:.7rem 1.1rem;border-radius:9px;font-size:.82rem;font-weight:600;animation:t-in .3s ease;display:flex;align-items:center;gap:.5rem;box-shadow:0 8px 32px rgba(0,0,0,.5);pointer-events:auto}
.toast.ok{background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.25);color:#2ECC71}
.toast.err{background:rgba(255,60,104,.1);border:1px solid rgba(255,60,104,.25);color:var(--hot)}
.toast.info{background:rgba(212,255,71,.08);border:1px solid var(--border-lime);color:var(--lime)}
@keyframes t-in{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}

/* STRENGTH METER */
.pw-meter{height:3px;border-radius:2px;background:var(--border);margin-top:.5rem;overflow:hidden}
.pw-bar{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}

/* SOCIAL PROOF */
.social-proof{display:flex;align-items:center;gap:.6rem;justify-content:center;margin-top:1.5rem;font-size:.75rem;color:var(--gray2)}
.proof-avatars{display:flex}
.pa{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--bg);font-size:.7rem;display:flex;align-items:center;justify-content:center;font-weight:700;margin-left:-6px}
.pa:first-child{margin-left:0}

@media(max-width:480px){
  .auth-card{padding:2rem 1.5rem;border-radius:16px}
}
</style>
</head>
<body>

<div class="auth-bg">
  <div class="bg-grid"></div>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
</div>

<div class="toast-stack" id="toasts"></div>

<nav>
  <a href="/" class="brand"><span class="brand-dot"></span>KizAi</a>
  <a href="/" class="nav-back">← Kembali ke Beranda</a>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="ai-badge">⚡ KizAi · Telegram AI Bot</div>
      <h1>Selamat Datang</h1>
      <p>Masuk atau buat akun baru untuk lanjut</p>
    </div>

    <div class="auth-tabs">
      <button class="tab on" id="tab-login" onclick="switchTab('login')">Masuk</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Daftar</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="form-group">
        <label class="fl">Username / Email</label>
        <div class="fi-wrap">
          <span class="fi-icon">👤</span>
          <input class="fi" id="l-user" type="text" placeholder="username atau email" autocomplete="username">
        </div>
        <span class="err-msg" id="l-user-err"></span>
      </div>
      <div class="form-group">
        <label class="fl">Password</label>
        <div class="fi-wrap">
          <span class="fi-icon">🔒</span>
          <input class="fi" id="l-pass" type="password" placeholder="password kamu" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
          <button class="fi-eye" onclick="togglePW('l-pass',this)">👁</button>
        </div>
      </div>
      <div class="form-aux"><a href="#" onclick="toast('Reset password via @nexdev_bot di Telegram','info');return false">Lupa password?</a></div>
      <button class="btn-auth" id="btn-login" onclick="doLogin()">Masuk →</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label class="fl">Username *</label>
        <div class="fi-wrap">
          <span class="fi-icon">👤</span>
          <input class="fi" id="r-user" type="text" placeholder="min 3 karakter" autocomplete="username" oninput="validateUsername()">
        </div>
        <span class="err-msg" id="r-user-err"></span>
      </div>
      <div class="form-group">
        <label class="fl">Email *</label>
        <div class="fi-wrap">
          <span class="fi-icon">📧</span>
          <input class="fi" id="r-email" type="email" placeholder="email@kamu.com" autocomplete="email">
        </div>
        <span class="err-msg" id="r-email-err"></span>
      </div>
      <div class="form-group">
        <label class="fl">Password *</label>
        <div class="fi-wrap">
          <span class="fi-icon">🔒</span>
          <input class="fi" id="r-pass" type="password" placeholder="min 6 karakter" autocomplete="new-password" oninput="checkPWStrength()">
          <button class="fi-eye" onclick="togglePW('r-pass',this)">👁</button>
        </div>
        <div class="pw-meter"><div class="pw-bar" id="pw-bar"></div></div>
        <span class="err-msg" id="r-pass-err"></span>
      </div>
      <div class="form-group">
        <label class="fl">ID Telegram (opsional)</label>
        <div class="fi-wrap">
          <span class="fi-icon">✈️</span>
          <input class="fi" id="r-tg" type="text" placeholder="@username atau ID numerik" autocomplete="off">
        </div>
      </div>
      <button class="btn-auth" id="btn-register" onclick="doRegister()" onkeydown="if(event.key==='Enter')doRegister()">Buat Akun →</button>
      <div class="terms">Dengan mendaftar kamu menyetujui <a href="#">Terms of Service</a> dan <a href="#">Privacy Policy</a> KizAi.</div>
    </div>

    <div class="social-proof">
      <div class="proof-avatars">
        <div class="pa" style="background:#5B5FEE">A</div>
        <div class="pa" style="background:#D4FF47;color:#08080E">B</div>
        <div class="pa" style="background:#7B5EA7">C</div>
        <div class="pa" style="background:#00D9FF;color:#08080E">+</div>
      </div>
      <span>2.500+ pengguna aktif sudah bergabung</span>
    </div>
  </div>
</div>

<script>
const API = '/api/auth';

function switchTab(t) {
  document.getElementById('tab-login').classList.toggle('on', t === 'login');
  document.getElementById('tab-register').classList.toggle('on', t === 'register');
  document.getElementById('login-form').style.display = t === 'login' ? '' : 'none';
  document.getElementById('register-form').style.display = t === 'register' ? '' : 'none';
  // Set URL hash
  history.replaceState(null, '', '#' + t);
}

// Check URL hash on load
if (location.hash === '#register') switchTab('register');

// Check if already logged in
const existingToken = localStorage.getItem('kizai_token');
if (existingToken) {
  fetch(`${API}?action=me`, { headers: { 'Authorization': 'Bearer ' + existingToken } })
    .then(r => r.json()).then(d => { if (d.user) window.location.href = '/dashboard.html'; }).catch(() => {});
}

function togglePW(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function validateUsername() {
  const v = document.getElementById('r-user').value;
  const err = document.getElementById('r-user-err');
  if (v.length > 0 && v.length < 3) { err.textContent = 'Min 3 karakter'; err.style.display = 'block'; }
  else if (!/^[a-zA-Z0-9_]+$/.test(v) && v.length > 0) { err.textContent = 'Hanya huruf, angka, underscore'; err.style.display = 'block'; }
  else err.style.display = 'none';
}

function checkPWStrength() {
  const pw = document.getElementById('r-pass').value;
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/\d/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const bar = document.getElementById('pw-bar');
  const w = [0, 20, 40, 65, 85, 100][score];
  const c = ['transparent', '#FF3C68', '#FFB830', '#FFB830', '#2ECC71', '#D4FF47'][score];
  bar.style.width = w + '%'; bar.style.background = c;
}

async function doLogin() {
  const btn = document.getElementById('btn-login');
  const user = document.getElementById('l-user').value.trim();
  const pass = document.getElementById('l-pass').value;
  if (!user || !pass) { toast('Lengkapi semua field', 'err'); return; }
  btn.disabled = true; btn.textContent = 'Masuk...';
  try {
    const r = await fetch(`${API}?action=login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: user, password: pass }) });
    const d = await r.json();
    if (!r.ok) { toast(d.error || 'Login gagal', 'err'); btn.disabled = false; btn.textContent = 'Masuk →'; return; }
    localStorage.setItem('kizai_token', d.token);
    localStorage.setItem('kizai_user', JSON.stringify(d.user));
    toast('Login berhasil! Mengalihkan...', 'ok');
    setTimeout(() => window.location.href = '/dashboard.html', 800);
  } catch { toast('Koneksi error', 'err'); btn.disabled = false; btn.textContent = 'Masuk →'; }
}

async function doRegister() {
  const btn = document.getElementById('btn-register');
  const username = document.getElementById('r-user').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const password = document.getElementById('r-pass').value;
  const telegram_id = document.getElementById('r-tg').value.trim();
  if (!username || !email || !password) { toast('Lengkapi semua field wajib', 'err'); return; }
  if (password.length < 6) { document.getElementById('r-pass-err').textContent = 'Min 6 karakter'; document.getElementById('r-pass-err').style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Mendaftar...';
  try {
    const r = await fetch(`${API}?action=register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, email, password, telegram_id }) });
    const d = await r.json();
    if (!r.ok) { toast(d.error || 'Gagal daftar', 'err'); btn.disabled = false; btn.textContent = 'Buat Akun →'; return; }
    localStorage.setItem('kizai_token', d.token);
    localStorage.setItem('kizai_user', JSON.stringify(d.user));
    toast('Akun berhasil dibuat! 🎉', 'ok');
    setTimeout(() => window.location.href = '/dashboard.html', 800);
  } catch { toast('Koneksi error', 'err'); btn.disabled = false; btn.textContent = 'Buat Akun →'; }
}

function toast(msg, type = 'ok') {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('login-form').style.display !== 'none') doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
