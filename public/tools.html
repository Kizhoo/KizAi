function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h_,s_,l_=(mx+mn)/2;if(mx===mn)h_=s_=0;else{const d=mx-mn;s_=l_>.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:h_=(g-b)/d+(g<b?6:0);break;case g:h_=(b-r)/d+2;break;default:h_=(r-g)/d+4}h_/=6}return[Math.round(h_*360),Math.round(s_*100),Math.round(l_*100)]}

let aiHistory=[];
async function sendAI(){const inp=document.getElementById('ai_inp');const msg=inp?.value.trim();if(!msg)return;const msgs=document.getElementById('ai_msgs');if(!msgs)return;msgs.innerHTML+=`<div class="am usr">${msg}</div>`;inp.value='';aiHistory.push({role:'user',content:msg});msgs.innerHTML+=`<div class="am ai" id="ai_typing">⏳ Thinking...</div>`;msgs.scrollTop=99999;
try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'@cf/meta/llama-3.1-8b-instruct',messages:aiHistory,model_id:'llama-8b'})});const d=await r.json();const reply=d.response||'Error koneksi.';document.getElementById('ai_typing')?.remove();msgs.innerHTML+=`<div class="am ai">${reply.replace(/\n/g,'<br>')}</div>`;aiHistory.push({role:'assistant',content:reply});msgs.scrollTop=99999}catch{document.getElementById('ai_typing')?.remove();msgs.innerHTML+=`<div class="am ai" style="color:var(--hot)">Error koneksi ke AI.</div>`}}
async function runAI(id){const inp=document.getElementById('ai_gen_in')?.value||'';const o=document.getElementById('ai_gen_out');if(!o)return;o.textContent='⏳ Generating...';const prompts={ai_sum:`Ringkas teks ini dalam Bahasa Indonesia:\n${inp}`,ai_gram:`Perbaiki tata bahasa/EYD teks ini:\n${inp}`,ai_trans:`Terjemah ke Bahasa Inggris yang natural:\n${inp}`,ai_story:`Tulis cerita pendek dari prompt: ${inp}`,ai_poem:`Tulis puisi tentang: ${inp}`,ai_biz:`Generate 5 nama bisnis untuk: ${inp}`,ai_seo:`Generate 5 judul SEO untuk topik: ${inp}`,ai_email:`Generate 5 subject email untuk: ${inp}`,ai_bio:`Tulis bio profesional untuk: ${inp}`,ai_code:`Buat/review kode: ${inp}`,ai_prodesc:`Tulis deskripsi produk untuk: ${inp}`,ai_caption:`Generate 3 caption Instagram untuk: ${inp}`,ai_idea:`Brainstorm 7 ide kreatif untuk: ${inp}`,ai_resume:`Tulis 4 poin resume untuk: ${inp}`};
try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'@cf/meta/llama-3.1-8b-instruct',messages:[{role:'user',content:prompts[id]||inp}],model_id:'llama-8b'})});const d=await r.json();o.textContent=d.response||'Error'}catch{o.textContent='Error koneksi ke AI.'}}
function copyTxt(t){navigator.clipboard.writeText((t||'').replace(/\(Klik untuk copy\)|Klik untuk copy ↑/g,'').trim()).then(()=>toast('✓ Tersalin!','ok')).catch(()=>{})}
function toast(msg,type='ok'){const w=document.getElementById('toasts');const el=document.createElement('div');el.className='toast_ '+type;el.textContent=msg;w.appendChild(el);setTimeout(()=>el.remove(),2200)}
