<!DOCTYPE html>
<html lang="id" data-theme="dark" data-accent="blue" data-fs="md">
<head>
<script>(function(){var p=JSON.parse(localStorage.getItem('kizai_prefs')||'{}');document.documentElement.setAttribute('data-theme',p.theme||'dark');document.documentElement.setAttribute('data-accent',p.accent||'blue');document.documentElement.setAttribute('data-fs',p.fontSize||'md')}())</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050510">
<title>Chat AI — KizAi</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<style>
html,body{height:100%;overflow:hidden}
.chat-layout{display:grid;grid-template-columns:280px 1fr;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:transform .3s var(--ease)}
.sidebar-top{padding:.85rem;border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;flex-direction:column;gap:.5rem}
.new-chat-btn{width:100%;padding:.65rem 1rem;border-radius:var(--r3);background:var(--accent);color:var(--accent-fg);border:none;cursor:pointer;font-family:var(--ff-body);font-weight:600;font-size:.88rem;display:flex;align-items:center;gap:.5rem;justify-content:center;transition:all .2s}
.new-chat-btn:hover{background:var(--accent2);transform:translateY(-1px)}
.search-wrap{position:relative}
.search-icon{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);font-size:.82rem;pointer-events:none;color:var(--gray2)}
.sidebar-search{width:100%;padding:.5rem .75rem .5rem 2.1rem;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);color:var(--white);font-size:.8rem;font-family:inherit;outline:none;transition:border-color .2s}
.sidebar-search:focus{border-color:rgba(var(--accent-rgb),.5)}
.sidebar-search::placeholder{color:var(--gray2)}

.sessions-wrap{flex:1;overflow-y:auto;padding:.4rem}
.session-group-label{font-family:var(--ff-mono);font-size:.58rem;text-transform:uppercase;letter-spacing:.12em;color:var(--gray2);padding:.55rem .5rem .2rem;font-weight:600}
.session-item{display:flex;align-items:center;gap:.45rem;padding:.52rem .6rem;border-radius:var(--r2);cursor:pointer;transition:all .15s;position:relative;margin-bottom:.05rem;border:1px solid transparent}
.session-item:hover{background:var(--card);border-color:var(--bd)}
.session-item.active{background:var(--accent-dim);border-color:rgba(var(--accent-rgb),.2)}
.session-model-ico{font-size:.9rem;width:22px;text-align:center;flex-shrink:0}
.session-info{flex:1;min-width:0}
.session-title{font-size:.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--white);line-height:1.3}
.session-item.active .session-title{color:var(--accent)}
.session-meta{font-size:.65rem;color:var(--gray2);font-family:var(--ff-mono);margin-top:.1rem}
.session-pin-ico{font-size:.65rem;flex-shrink:0;opacity:.5}
.session-actions{display:flex;gap:.1rem;opacity:0;transition:opacity .15s;flex-shrink:0;position:absolute;right:.4rem;top:50%;transform:translateY(-50%);background:var(--card);border-radius:var(--r);padding:.1rem;border:1px solid var(--bd)}
.session-item:hover .session-actions{opacity:1}
.session-act-btn{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:3px;background:none;border:none;color:var(--gray);cursor:pointer;font-size:.68rem;transition:all .15s}
.session-act-btn:hover{background:var(--bg3);color:var(--white)}
.sessions-empty{padding:2rem 1rem;text-align:center;color:var(--gray2);font-size:.8rem;display:flex;flex-direction:column;align-items:center;gap:.5rem}

.sidebar-bottom{padding:.7rem;border-top:1px solid var(--bd);flex-shrink:0;display:flex;flex-direction:column;gap:.5rem}
.sb-model-wrap{position:relative}
.sb-model-label{font-family:var(--ff-mono);font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gray2);margin-bottom:.25rem}
.model-sel-btn{width:100%;padding:.5rem .75rem;border-radius:var(--r2);background:var(--bg3);border:1px solid var(--bd);color:var(--white);font-size:.8rem;cursor:pointer;display:flex;align-items:center;gap:.4rem;transition:all .15s;font-family:inherit}
.model-sel-btn:hover{border-color:var(--bd2)}
.sidebar-user{display:flex;align-items:center;gap:.55rem}
.su-ava{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.su-info{flex:1;min-width:0}
.su-name{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.su-plan{font-family:var(--ff-mono);font-size:.58rem;color:var(--gray2)}

/* ── CHAT AREA ── */
.chat-area{display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative}
.chat-topbar{height:54px;border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 1rem;gap:.6rem;flex-shrink:0;background:var(--bg)}
.topbar-left{display:flex;align-items:center;gap:.5rem;flex:1;min-width:0}
.menu-btn{background:none;border:none;color:var(--gray);cursor:pointer;font-size:1rem;padding:.3rem;border-radius:var(--r);transition:all .15s;flex-shrink:0}
.menu-btn:hover{background:rgba(255,255,255,.07);color:var(--white)}
.session-title-top{font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;max-width:240px}
.session-title-top:hover{color:var(--accent)}
.model-pill{display:flex;align-items:center;gap:.3rem;padding:.2rem .55rem;border-radius:100px;background:var(--accent-dim);font-family:var(--ff-mono);font-size:.62rem;color:var(--accent);cursor:pointer;flex-shrink:0;transition:all .15s}
.model-pill:hover{background:rgba(var(--accent-rgb),.2)}
.topbar-right{display:flex;align-items:center;gap:.2rem;flex-shrink:0}
.tb-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--r2);background:none;border:none;color:var(--gray);cursor:pointer;font-size:.85rem;transition:all .15s}
.tb-btn:hover{background:rgba(255,255,255,.07);color:var(--white)}

/* MESSAGES */
.msgs-area{flex:1;overflow-y:auto;scroll-behavior:smooth;padding:1.25rem 1.5rem 0;position:relative}
.msg-date-divider{text-align:center;margin:1.25rem 0;display:flex;align-items:center;gap:.75rem;color:var(--gray2)}
.msg-date-divider::before,.msg-date-divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.msg-date-divider span{font-family:var(--ff-mono);font-size:.62rem;letter-spacing:.08em;white-space:nowrap}
.msg-wrap{display:flex;gap:.7rem;max-width:820px;animation:fade-up .25s ease both;margin-bottom:1.1rem}
.msg-wrap.user-msg{flex-direction:row-reverse;margin-left:auto}
.msg-ava{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82rem;flex-shrink:0;margin-top:.18rem}
.msg-ava.ai-ava{background:var(--accent-dim);border:1px solid rgba(var(--accent-rgb),.2)}
.msg-ava.user-ava{background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.25)}
.msg-body{flex:1;max-width:calc(100% - 42px)}
.msg-header{display:flex;align-items:center;gap:.35rem;margin-bottom:.35rem;font-family:var(--ff-mono);font-size:.62rem;color:var(--gray2)}
.user-msg .msg-header{flex-direction:row-reverse}
.msg-sender{font-weight:700;color:var(--white);font-size:.75rem;font-family:var(--ff-body)}
.user-msg .msg-sender{color:var(--violet)}
.msg-time{color:var(--gray2)}
.msg-model-tag{color:var(--accent);font-size:.6rem}
.msg-tokens{font-size:.6rem;color:var(--gray2)}
.bubble{padding:.8rem 1rem;border-radius:var(--r4);font-size:.88rem;line-height:1.75;word-break:break-word;position:relative}
.ai-bub{background:var(--card);border:1px solid var(--bd);border-radius:var(--r) var(--r4) var(--r4) var(--r4)}
.user-bub{background:linear-gradient(135deg,rgba(var(--accent-rgb),.9),rgba(var(--accent-rgb),.75));color:#fff;border-radius:var(--r4) var(--r) var(--r4) var(--r4)}
.msg-actions-row{display:flex;gap:.2rem;margin-top:.35rem;opacity:0;transition:opacity .15s}
.msg-wrap:hover .msg-actions-row{opacity:1}
.user-msg .msg-actions-row{justify-content:flex-end}
.ma-btn{background:none;border:none;color:var(--gray2);cursor:pointer;font-size:.7rem;padding:.2rem .42rem;border-radius:4px;transition:all .15s;font-family:var(--ff-mono)}
.ma-btn:hover{background:var(--bg3);color:var(--white)}
.streaming-cursor{display:inline-block;width:2px;height:1em;background:var(--accent);margin-left:2px;animation:blink .7s step-end infinite;vertical-align:text-bottom}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* TYPING INDICATOR */
.typing-wrap{display:flex;gap:.7rem;margin-bottom:1rem;max-width:820px;animation:fade-up .25s ease both}
.typing-bubble{background:var(--card);border:1px solid var(--bd);border-radius:var(--r) var(--r4) var(--r4) var(--r4);padding:.8rem 1.1rem;display:flex;align-items:center;gap:.45rem}
.ty-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:ty-bounce .9s ease-in-out infinite}
.ty-dot:nth-child(2){animation-delay:.15s}.ty-dot:nth-child(3){animation-delay:.3s}
@keyframes ty-bounce{0%,60%,100%{transform:translateY(0);opacity:.6}30%{transform:translateY(-8px);opacity:1}}

/* WELCOME */
.welcome-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;overflow-y:auto;pointer-events:auto;z-index:1}
.welcome-brand{font-family:var(--ff-display);font-weight:900;font-size:2.8rem;letter-spacing:-.06em;margin-bottom:.4rem}
.welcome-greeting{color:var(--gray);font-size:.95rem;margin-bottom:2.25rem;line-height:1.7;max-width:440px}
.starters-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem;max-width:560px;width:100%}
.starter{background:var(--card);border:1.5px solid var(--bd);border-radius:var(--r3);padding:.9rem 1rem;text-align:left;cursor:pointer;transition:all .2s}
.starter:hover{border-color:rgba(var(--accent-rgb),.35);background:var(--accent-dim);color:var(--accent)}
.starter-emoji{font-size:1.15rem;margin-bottom:.35rem;display:block}
.starter-label{font-size:.82rem;font-weight:500;line-height:1.4;color:var(--white)}
.starter:hover .starter-label{color:var(--accent)}

/* INPUT */
.input-zone{padding:.75rem 1.25rem;border-top:1px solid var(--bd);background:var(--bg);flex-shrink:0}
.input-inner{max-width:820px;margin:0 auto}
.input-card{background:var(--card);border:1.5px solid var(--bd);border-radius:var(--r4);overflow:hidden;transition:border-color .2s,box-shadow .2s}
.input-card:focus-within{border-color:rgba(var(--accent-rgb),.5);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.08)}
.input-row{display:flex;align-items:flex-end;gap:.5rem;padding:.65rem .75rem .5rem}
.chat-ta{flex:1;background:none;border:none;outline:none;color:var(--white);font-size:.9rem;font-family:var(--ff-body);resize:none;min-height:26px;max-height:220px;overflow-y:auto;line-height:1.65;padding-top:.05rem}
.chat-ta::placeholder{color:var(--gray2)}
.send-btn{width:34px;height:34px;border-radius:var(--r2);background:var(--accent);color:var(--accent-fg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.05rem;transition:all .2s;flex-shrink:0}
.send-btn:hover:not(:disabled){background:var(--accent2);transform:scale(1.08)}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.stop-btn{width:34px;height:34px;border-radius:var(--r2);background:rgba(var(--hot-rgb),.15);color:var(--hot);border:1px solid rgba(var(--hot-rgb),.25);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .2s;flex-shrink:0}
.stop-btn:hover{background:rgba(var(--hot-rgb),.25)}
.input-toolbar{display:flex;align-items:center;justify-content:space-between;padding:.3rem .75rem .6rem}
.it-left{display:flex;gap:.15rem}
.it-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:var(--r);background:none;border:none;color:var(--gray2);cursor:pointer;font-size:.8rem;transition:all .15s}
.it-btn:hover{background:var(--bg3);color:var(--white)}
.char-cnt{font-family:var(--ff-mono);font-size:.6rem;color:var(--gray2)}
.char-cnt.warn{color:var(--amber)}.char-cnt.over{color:var(--hot)}
.input-hint{text-align:center;font-family:var(--ff-mono);font-size:.6rem;color:var(--gray2);margin-top:.35rem}

/* MODAL — MODEL PICKER */
.model-pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.75rem;max-height:420px;overflow-y:auto}
.mpk{background:var(--bg3);border:2px solid var(--bd);border-radius:var(--r3);padding:.9rem;cursor:pointer;transition:all .2s;position:relative}
.mpk:hover{border-color:var(--bd2)}.mpk.sel{border-color:var(--accent);background:var(--accent-dim)}
.mpk.locked{opacity:.45;cursor:not-allowed}
.mpk.locked::after{content:'🔒';position:absolute;top:.5rem;right:.6rem}
.mpk-top{display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem}
.mpk-ico{font-size:1.1rem}
.mpk-name{font-family:var(--ff-display);font-weight:700;font-size:.88rem;letter-spacing:-.02em}
.mpk-prov{font-size:.7rem;color:var(--gray);margin-bottom:.25rem}
.mpk-desc{font-size:.72rem;color:var(--gray);line-height:1.5;margin-bottom:.35rem}

/* PROMPT TEMPLATES MODAL */
.prompt-cats{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:1rem}
.prompt-cat{padding:.28rem .7rem;border-radius:100px;font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid var(--bd);color:var(--gray);background:none;transition:all .15s;font-family:inherit}
.prompt-cat.active{background:var(--accent-dim);border-color:rgba(var(--accent-rgb),.3);color:var(--accent)}
.prompts-list{display:flex;flex-direction:column;gap:.4rem;max-height:380px;overflow-y:auto}
.prompt-item{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:.75rem 1rem;cursor:pointer;transition:all .15s}
.prompt-item:hover{border-color:rgba(var(--accent-rgb),.3);background:var(--accent-dim)}
.prompt-title{font-weight:600;font-size:.85rem;margin-bottom:.2rem}
.prompt-text{font-size:.78rem;color:var(--gray);line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* RESPONSIVE */
@media(max-width:900px){
  .chat-layout{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:400;width:280px;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:399;transition:opacity .3s}
  .sidebar-overlay.show{display:block}
}
@media(max-width:480px){
  .msgs-area{padding:.75rem}
  .input-zone{padding:.5rem .75rem}
  .starters-grid{grid-template-columns:1fr}
  .msg-wrap{max-width:100%}
  .model-pick-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="toast-stack"></div>
<div class="sidebar-overlay" id="sb-overlay" onclick="closeSidebar()"></div>

<!-- MODEL PICKER MODAL -->
<div class="modal-overlay" id="model-modal">
  <div class="modal" style="max-width:620px">
    <div class="modal-inner">
      <div class="modal-head">
        <span class="modal-title">Pilih Model AI</span>
        <button class="modal-close" onclick="Modal.close('model-modal')">✕</button>
      </div>
      <div class="model-pick-grid" id="model-pick-grid"></div>
    </div>
  </div>
</div>

<!-- RENAME MODAL -->
<div class="modal-overlay" id="rename-modal">
  <div class="modal" style="max-width:440px">
    <div class="modal-inner">
      <div class="modal-head">
        <span class="modal-title">Ganti Nama Sesi</span>
        <button class="modal-close" onclick="Modal.close('rename-modal')">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">Nama baru</label>
        <input class="input" id="rename-inp" placeholder="Nama percakapan..." maxlength="60">
      </div>
      <div class="flex gap-3" style="justify-content:flex-end;margin-top:1rem">
        <button class="btn btn-outline btn-sm" onclick="Modal.close('rename-modal')">Batal</button>
        <button class="btn btn-primary btn-sm" onclick="doRename()">💾 Simpan</button>
      </div>
    </div>
  </div>
</div>

<!-- PROMPT TEMPLATES MODAL -->
<div class="modal-overlay" id="tmpl-modal">
  <div class="modal" style="max-width:560px">
    <div class="modal-inner">
      <div class="modal-head">
        <span class="modal-title">📋 Prompt Templates</span>
        <button class="modal-close" onclick="Modal.close('tmpl-modal')">✕</button>
      </div>
      <div class="prompt-cats" id="prompt-cats"></div>
      <div class="prompts-list" id="prompts-list"></div>
    </div>
  </div>
</div>

<div class="chat-layout">
  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <button class="new-chat-btn" onclick="newChat()">✏️ Chat Baru</button>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="sidebar-search" id="sb-search" placeholder="Cari percakapan..." oninput="filterSessions(this.value)">
      </div>
    </div>

    <div class="sessions-wrap" id="sessions-wrap">
      <div class="sessions-empty" id="sessions-empty">
        <span style="font-size:2rem">💬</span>
        <span>Belum ada percakapan</span>
        <span style="font-size:.72rem">Klik "Chat Baru" untuk mulai</span>
      </div>
    </div>

    <div class="sidebar-bottom">
      <div class="sb-model-wrap">
        <div class="sb-model-label">Model aktif</div>
        <button class="model-sel-btn" id="model-sel-btn" onclick="Modal.open('model-modal')">
          <span id="msb-ico">🦙</span>
          <span id="msb-name" style="flex:1;text-align:left">Llama 3.1 8B</span>
          <span style="color:var(--gray2);font-size:.7rem">▼</span>
        </button>
      </div>
      <div class="sidebar-user">
        <div class="su-ava" id="sb-ava"></div>
        <div class="su-info">
          <div class="su-name" id="sb-uname">Memuat...</div>
          <div class="su-plan" id="sb-uplan"></div>
        </div>
        <a href="/dashboard" class="tb-btn" data-tip="Dashboard" style="color:var(--gray);text-decoration:none">⚙️</a>
      </div>
    </div>
  </aside>

  <!-- ── MAIN CHAT AREA ── -->
  <main class="chat-area">
    <div class="chat-topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <span class="session-title-top" id="sess-title" onclick="openRename()">Chat AI</span>
        <div class="model-pill" id="model-pill-top" onclick="Modal.open('model-modal')">
          <span id="mpt-ico">🦙</span>
          <span id="mpt-name">Llama 8B</span>
          <span style="color:var(--gray2)">▼</span>
        </div>
      </div>
      <div class="topbar-right">
        <button class="tb-btn" data-tip="Hapus sesi" onclick="deleteCurrentSession()" style="color:var(--hot)">🗑️</button>
        <button class="tb-btn" data-tip="Ekspor TXT" onclick="exportChat('txt')">📥</button>
        <button class="tb-btn" data-tip="Ekspor JSON" onclick="exportChat('json')">📦</button>
        <button class="tb-btn" data-tip="Salin semua" onclick="copyAllChat()">📋</button>
        <a href="/" class="tb-btn" data-tip="Beranda" style="color:var(--gray);text-decoration:none">🏠</a>
      </div>
    </div>

    <div class="msgs-area" id="msgs-area">
      <!-- Welcome screen -->
      <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-brand">
          <span style="background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Kiz</span><span>Ai</span>
        </div>
        <p class="welcome-greeting" id="welcome-greeting">Halo! Aku siap membantu kamu.</p>
        <div class="starters-grid" id="starters-grid"></div>
      </div>
    </div>

    <div class="input-zone">
      <div class="input-inner">
        <div class="input-card">
          <div class="input-row">
            <textarea class="chat-ta" id="chat-ta" placeholder="Kirim pesan ke AI..." rows="1"
              onkeydown="handleTaKey(event)"
              oninput="autoResize(this);updateCharCnt()"></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMsg()">↑</button>
            <button class="stop-btn" id="stop-btn" style="display:none" onclick="stopStream()">■</button>
          </div>
          <div class="input-toolbar">
            <div class="it-left">
              <button class="it-btn" data-tip="Template" onclick="Modal.open('tmpl-modal')">📋</button>
              <button class="it-btn" data-tip="Voice" onclick="startVoice()">🎤</button>
              <label class="it-btn" data-tip="Upload Gambar/File" style="cursor:pointer">
                📎<input type="file" accept="image/*,.pdf,.txt,.csv,.json,.md" style="display:none" onchange="handleFileUpload(this)">
              </label>
              <button class="it-btn" data-tip="Hapus input" onclick="clearInput()">✕</button>

</div>

<script src="/shared.js"></script>
<script>
/* ═══════════════ STATE ═══════════════ */
let sessions = [], allSessions = [];
let currentSession = null;
let messages = [];
let currentModel = 'llama-8b';
let isStreaming = false;
let streamCtrl = null;
let renamingId = null;
let activePCat = 'Semua';

const CHAR_LIMIT = 4000;
const MAX_HISTORY = 12; // messages to send as context

/* ═══════════════ PROMPT TEMPLATES ═══════════════ */
const PROMPT_TEMPLATES = [
  { cat:'Coding', title:'Debug kode', text:'Tolong debug kode berikut dan jelaskan errornya:\n\n```\n[paste kode di sini]\n```' },

  { cat:'Coding', title:'Jelaskan konsep', text:'Jelaskan konsep [topik] dengan cara yang mudah dipahami. Berikan contoh kode jika relevan.' },
  { cat:'Penulisan', title:'Tulis artikel', text:'Tulis artikel informatif tentang [topik] dengan format:\n- Judul menarik\n- Pendahuluan\n- 3-5 poin utama\n- Kesimpulan' },
  { cat:'Penulisan', title:'Revisi teks', text:'Tolong perbaiki teks berikut agar lebih profesional dan mudah dibaca:\n\n[paste teks di sini]' },

/* ═══════════════ INIT ═══════════════ */
document.addEventListener('DOMContentLoaded', async () => {
  if (!Auth.isLoggedIn()) {
    sessionStorage.setItem('kizai_redirect', '/chat');
    location.href = '/auth'; return;
  }
  const user = Auth.getUser();

  renderModelPicker(user);

function initSidebarUser(user) {

function renderStarters(user) {

    { emoji:'💡', label:'Bantu aku brainstorm ide untuk project baru' },

    { emoji:'📊', label:'Jelaskan konsep machine learning dengan sederhana' },
    { emoji:'✍️', label:'Tulis email profesional untuk klien' },

    `<div class="starter" onclick="useStarter('${s.label.replace(/'/g,"\\'")}')">
      <span class="starter-emoji">${s.emoji}</span>
      <div class="starter-label">${s.label}</div>
    </div>`).join('');
}

function useStarter(text) {
  const ta = document.getElementById('chat-ta');
  ta.value = text;
  autoResize(ta);
  updateCharCnt();
  ta.focus();
  if (!currentSession) newChat(false);
  else sendMsg();
}

/* ═══════════════ SESSIONS ═══════════════ */
async function loadSessions() {
  const { data, ok } = await API.get('/api/chat?action=sessions');
  if (!ok) return;
  allSessions = sessions = data?.sessions || [];
  renderSessions(sessions);
}

function renderSessions(list) {
  const wrap = document.getElementById('sessions-wrap');
  const empty = document.getElementById('sessions-empty');
  wrap.querySelectorAll('.session-group-label,.session-item').forEach(e => e.remove());

  if (!list.length) { empty.style.display = 'flex'; return; }
  empty.style.display = 'none';

  const groups = [
    { label:'Hari Ini',   filter: s => isToday(s.updated_at || s.created_at) },
    { label:'Kemarin',    filter: s => isYesterday(s.updated_at || s.created_at) },
    { label:'Minggu Ini', filter: s => isThisWeek(s.updated_at || s.created_at) },
    { label:'Lebih Lama', filter: () => true },
  ];
  const added = new Set();
  groups.forEach(g => {
    const items = list.filter(s => !added.has(s.id) && g.filter(s));
    if (!items.length) return;
    items.forEach(s => added.add(s.id));
    const lbl = DOM.create('div',{className:'session-group-label'},[ g.label ]);
    wrap.appendChild(lbl);
    items.forEach(s => wrap.appendChild(buildSessionEl(s)));
  });
}

function buildSessionEl(s) {
  const m = KZ.models.find(x => x.id === (s.model_id || 'llama-8b')) || KZ.models[0];
  const el = DOM.create('div',{className:`session-item${currentSession?.id===s.id?' active':''}`, id:'si-'+s.id});
  el.innerHTML = `
    <span class="session-model-ico">${m.icon}</span>
    <div class="session-info">
      <div class="session-title">${Format.escape(s.title||'Chat baru')}</div>
      <div class="session-meta">${s.message_count||0} pesan · ${Format.relativeTime(s.updated_at||s.created_at)}</div>
    </div>
    ${s.is_pinned?'<span class="session-pin-ico" title="Disematkan">📌</span>':''}
    <div class="session-actions">
      <button class="session-act-btn" onclick="event.stopPropagation();togglePin('${s.id}',${!s.is_pinned})" title="${s.is_pinned?'Lepas pin':'Pin'}">📌</button>
      <button class="session-act-btn" onclick="event.stopPropagation();startRename('${s.id}','${Format.escape(s.title||'')}')">✏️</button>
      <button class="session-act-btn" onclick="event.stopPropagation();deleteSession('${s.id}')" style="color:var(--hot)">🗑️</button>
    </div>`;
  el.addEventListener('click', () => loadSession(s.id));
  return el;
}

function filterSessions(q) {
  if (!q.trim()) { renderSessions(allSessions); return; }
  const filtered = allSessions.filter(s =>
    (s.title||'').toLowerCase().includes(q.toLowerCase()) ||
    (s.last_message||'').toLowerCase().includes(q.toLowerCase())
  );
  renderSessions(filtered);
}

async function newChat(autoLoad = true) {
  const { data, ok } = await API.post('/api/chat?action=new_session', { model_id: currentModel });
  if (!ok) { Toast.err('Gagal membuat chat baru'); return; }
  allSessions.unshift(data.session);
  sessions = allSessions;
  renderSessions(sessions);
  if (autoLoad) await loadSession(data.session.id);
  if (window.innerWidth < 900) closeSidebar();
}

async function loadSession(id) {
  document.querySelectorAll('.session-item').forEach(e => e.classList.remove('active'));
  document.getElementById('si-'+id)?.classList.add('active');

  currentSession = allSessions.find(s => s.id === id);
  if (!currentSession) return;

  document.getElementById('sess-title').textContent = currentSession.title || 'Chat baru';
  setModel(currentSession.model_id || 'llama-8b');
  hideWelcome();

  const { data, ok } = await API.get(`/api/chat?action=messages&session_id=${id}`);
  if (!ok) { Toast.err('Gagal memuat pesan'); return; }

  messages = data?.messages || [];
  renderAllMsgs();
  scrollBottom();
  history.replaceState(null,'',`/chat?session=${id}`);
}

/* ═══════════════ MESSAGES RENDER ═══════════════ */
function hideWelcome() {
  const ws = document.getElementById('welcome-screen');
  if (ws) ws.style.display = 'none';
}

function renderAllMsgs() {
  const area = document.getElementById('msgs-area');
  area.querySelectorAll('.msg-wrap,.msg-date-divider,.typing-wrap').forEach(e => e.remove());
  if (!messages.length) return;
  let lastDate = '';
  messages.forEach(m => {
    const d = new Date(m.created_at).toDateString();
    if (d !== lastDate) {
      const div = DOM.create('div',{className:'msg-date-divider'});
      div.innerHTML = `<span>${Format.date(m.created_at,{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</span>`;
      area.appendChild(div);
      lastDate = d;
    }
    area.appendChild(buildMsgEl(m));
  });
}

function buildMsgEl(msg) {
  const isUser = msg.role === 'user';
  const m = KZ.models.find(x => x.id === msg.model_id) || KZ.models[0];
  const user = Auth.getUser();
  const div = DOM.create('div',{className:`msg-wrap ${isUser?'user-msg':'ai-msg'}`,id:'msg-'+msg.id});
  const content = isUser
    ? `<p style="white-space:pre-wrap">${Format.escape(msg.content)}</p>`
    : MD.render(msg.content);

  div.innerHTML = `
    <div class="msg-ava ${isUser?'user-ava':'ai-ava'}">${isUser?(user?.avatar_emoji||'👤'):(m?.icon||'🤖')}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-sender">${isUser?(user?.username||'Kamu'):(m?.name||'AI')}</span>
        ${!isUser?`<span class="msg-model-tag">${m?.name||''}</span>`:''}
        <span class="msg-time">${Format.relativeTime(msg.created_at)}</span>
        ${msg.tokens_used?`<span class="msg-tokens">${msg.tokens_used} tokens</span>`:''}
      </div>
      <div class="bubble ${isUser?'user-bub':'ai-bub'}" id="bub-${msg.id}">${content}</div>
      <div class="msg-actions-row">
        <button class="ma-btn" onclick="Clipboard.copy(document.getElementById('bub-${msg.id}').innerText,'Disalin!')">📋 copy</button>
        ${!isUser?`<button class="ma-btn" onclick="regenMsg('${msg.id}')">🔄 ulang</button>`:''}
        <button class="ma-btn" onclick="deleteMsg('${msg.id}')" style="color:var(--hot)">🗑️</button>
      </div>
    </div>`;
  return div;
}

function addMsgToUI(msg) {
  const area = document.getElementById('msgs-area');
  const el = buildMsgEl(msg);
  area.appendChild(el);
  scrollBottom();
}

function showTyping() {
  removeTyping();
  const m = KZ.models.find(x => x.id === currentModel) || KZ.models[0];
  const div = DOM.create('div',{className:'typing-wrap',id:'typing-ind'});
  div.innerHTML = `
    <div class="msg-ava ai-ava">${m.icon}</div>
    <div class="typing-bubble"><div class="ty-dot"></div><div class="ty-dot"></div><div class="ty-dot"></div></div>`;
  document.getElementById('msgs-area').appendChild(div);
  scrollBottom();
}
function removeTyping() { document.getElementById('typing-ind')?.remove(); }

function scrollBottom() {
  const area = document.getElementById('msgs-area');
  setTimeout(() => area.scrollTo({top:area.scrollHeight,behavior:'smooth'}), 50);
}

/* ═══════════════ SEND MESSAGE ═══════════════ */
async function sendMsg() {
  if (isStreaming) return;
  const ta = document.getElementById('chat-ta');
  const text = ta.value.trim();
  if (!text) return;
  if (text.length > CHAR_LIMIT) { Toast.warn(`Terlalu panjang (max ${CHAR_LIMIT} karakter)`); return; }

  // Create session if none
  if (!currentSession) {
    await newChat(false);
    if (!currentSession) return;
  }

  ta.value = '';
  autoResize(ta);
  updateCharCnt();
  hideWelcome();

  // Include attachment in message
  let fullText = text;
  if (attachedFile) {
    if (attachedFile.type.startsWith('image/')) {
      fullText = text + (text ? '\n\n' : '') + '[Gambar dilampirkan: ' + attachedFile.name + ']';
    } else {
      const preview = attachedFile.data?.slice(0, 3000) || '';
      fullText = text + (text ? '\n\n' : '') + `File: ${attachedFile.name}\n\`\`\`\n${preview}\n\`\`\``;
    }
    clearAttachment();
  }

  // Add user message optimistically
  const userMsg = {
    id: 'tmp-' + Date.now(),
    session_id: currentSession.id,
    role: 'user',
    content: fullText,
    model_id: currentModel,
    created_at: new Date().toISOString(),
    tokens_used: 0
  };
  messages.push(userMsg);
  addMsgToUI(userMsg);
  showTyping();
  setStreaming(true);

  // Build context (last N messages)
  const contextMsgs = messages.slice(-MAX_HISTORY).filter(m => m.id !== userMsg.id).map(m => ({
    role: m.role, content: m.content
  }));

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...Auth.authHeader() },
      body: JSON.stringify({
        session_id: currentSession.id,
        message: fullText,
        model_id: currentModel,
        history: contextMsgs
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      removeTyping();
      setStreaming(false);
      Toast.err(err.error || 'Gagal mengirim pesan');
      messages.pop();
      document.getElementById('msg-' + userMsg.id)?.remove();
      return;
    }

    // Handle streaming
    if (res.headers.get('content-type')?.includes('text/event-stream') ||
        res.headers.get('content-type')?.includes('text/plain')) {
      await handleStream(res);
    } else {
      const data = await res.json();
      removeTyping();
      if (data.user_message) {
        messages[messages.length-1] = data.user_message;
        const el = document.getElementById('msg-' + userMsg.id);
        if (el) el.id = 'msg-' + data.user_message.id;
      }
      if (data.ai_message) {
        messages.push(data.ai_message);
        addMsgToUI(data.ai_message);
      }
      updateSessionInList(data.session || currentSession);
    }
  } catch (e) {
    removeTyping();
    Toast.err('Koneksi terputus, coba lagi');
    messages.pop();
    document.getElementById('msg-' + userMsg.id)?.remove();
  } finally {
    setStreaming(false);
  }
}

async function handleStream(res) {
  removeTyping();
  const m = KZ.models.find(x => x.id === currentModel) || KZ.models[0];
  const user = Auth.getUser();

  // Create AI bubble
  const aiMsgId = 'stream-' + Date.now();
  const area = document.getElementById('msgs-area');
  const div = DOM.create('div',{className:'msg-wrap ai-msg',id:'msg-'+aiMsgId});
  div.innerHTML = `
    <div class="msg-ava ai-ava">${m.icon}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-sender">${m.name}</span>
        <span class="msg-model-tag">${m.name}</span>
        <span class="msg-time">baru saja</span>
      </div>
      <div class="bubble ai-bub" id="bub-${aiMsgId}"><span class="streaming-cursor"></span></div>
      <div class="msg-actions-row" style="opacity:0"></div>
    </div>`;
  area.appendChild(div);
  scrollBottom();

  const bub = document.getElementById('bub-'+aiMsgId);
  let fullText = '';
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  streamCtrl = reader;

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      // Handle SSE format
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6).trim();
          if (data === '[DONE]') break;
          try {
            const parsed = JSON.parse(data);
            const token = parsed.choices?.[0]?.delta?.content || parsed.token || parsed.text || '';
            fullText += token;
            bub.innerHTML = MD.render(fullText) + '<span class="streaming-cursor"></span>';
            scrollBottom();
          } catch {}
        } else if (line && !line.startsWith(':')) {
          fullText += line;
          bub.innerHTML = MD.render(fullText) + '<span class="streaming-cursor"></span>';
          scrollBottom();
        }
      }
    }
  } catch {}

  bub.innerHTML = MD.render(fullText) || '<em style="color:var(--gray2)">Tidak ada respons</em>';

  // Final AI message
  const aiMsg = {
    id: aiMsgId,
    session_id: currentSession.id,
    role: 'assistant',
    content: fullText,
    model_id: currentModel,
    created_at: new Date().toISOString(),
    tokens_used: Math.ceil(fullText.length / 4)
  };
  messages.push(aiMsg);

  // Add action buttons
  const actRow = div.querySelector('.msg-actions-row');
  if (actRow) {
    actRow.style.opacity = '';
    actRow.innerHTML = `
      <button class="ma-btn" onclick="Clipboard.copy(document.getElementById('bub-${aiMsgId}').innerText,'Disalin!')">📋 copy</button>
      <button class="ma-btn" onclick="regenMsg('${aiMsgId}')">🔄 ulang</button>`;
  }

  updateSessionInList({ ...currentSession, last_message: fullText.slice(0,80), message_count: messages.length });
}

function setStreaming(v) {
  isStreaming = v;
  document.getElementById('send-btn').style.display = v ? 'none' : '';
  document.getElementById('stop-btn').style.display = v ? '' : 'none';
}

function stopStream() {
  if (streamCtrl) { try { streamCtrl.cancel(); } catch {} }
  removeTyping();
  setStreaming(false);
  Toast.info('Dihentikan');
}

/* ═══════════════ SESSION MANAGEMENT ═══════════════ */
function updateSessionInList(sess) {
  const idx = allSessions.findIndex(s => s.id === sess.id);
  if (idx >= 0) { allSessions[idx] = { ...allSessions[idx], ...sess }; }
  sessions = allSessions;
  renderSessions(sessions);
  document.getElementById('si-'+sess.id)?.classList.add('active');
  // Auto-generate title after first exchange
  if (messages.length === 2 && (currentSession?.title === 'Chat Baru' || currentSession?.title === 'New Chat')) {
    autoTitle();
  }
}

async function autoTitle() {
  const firstUserMsg = messages.find(m => m.role === 'user');
  if (!firstUserMsg || !currentSession) return;
  const title = firstUserMsg.content.slice(0, 50).trim().replace(/\n/g,' ') + (firstUserMsg.content.length > 50 ? '...' : '');
  await API.put(`/api/chat?action=rename_session&id=${currentSession.id}`, { title });
  currentSession.title = title;
  document.getElementById('sess-title').textContent = title;
  const idx = allSessions.findIndex(s => s.id === currentSession.id);
  if (idx >= 0) allSessions[idx].title = title;
  renderSessions(allSessions);
  document.getElementById('si-'+currentSession.id)?.classList.add('active');
}

async function togglePin(id, pin) {
  await API.put(`/api/chat?action=pin_session&id=${id}`, { is_pinned: pin });
  const s = allSessions.find(x => x.id === id);
  if (s) s.is_pinned = pin;
  renderSessions(allSessions);
  Toast.ok(pin ? '📌 Disematkan' : 'Pin dilepas');
}

function startRename(id, currentTitle) {
  renamingId = id;
  document.getElementById('rename-inp').value = currentTitle || '';
  Modal.open('rename-modal');
  setTimeout(() => document.getElementById('rename-inp').select(), 100);
}

function openRename() {
  if (!currentSession) return;
  startRename(currentSession.id, currentSession.title);
}

async function doRename() {
  const title = document.getElementById('rename-inp').value.trim();
  if (!title) { Toast.warn('Nama tidak boleh kosong'); return; }
  await API.put(`/api/chat?action=rename_session&id=${renamingId}`, { title });
  const s = allSessions.find(x => x.id === renamingId);
  if (s) s.title = title;
  if (currentSession?.id === renamingId) {
    currentSession.title = title;
    document.getElementById('sess-title').textContent = title;
  }
  renderSessions(allSessions);
  document.getElementById('si-'+renamingId)?.classList.add('active');
  Modal.close('rename-modal');
  Toast.ok('Nama diubah');
}

async function deleteSession(id) {
  Modal.confirm('Hapus Percakapan?','Semua pesan dalam sesi ini akan dihapus permanen.', async () => {
    await API.del(`/api/chat?action=delete_session&id=${id}`);
    allSessions = allSessions.filter(s => s.id !== id);
    sessions = allSessions;
    renderSessions(sessions);
    if (currentSession?.id === id) {
      currentSession = null; messages = [];
      document.getElementById('msgs-area').querySelectorAll('.msg-wrap,.msg-date-divider').forEach(e=>e.remove());
      document.getElementById('welcome-screen').style.display = '';
      document.getElementById('sess-title').textContent = 'Chat AI';
      history.replaceState(null,'','/chat');
    }
    Toast.ok('Sesi dihapus');
  });
}

function deleteCurrentSession() {
  if (!currentSession) return;
  deleteSession(currentSession.id);
}

async function deleteMsg(id) {
  await API.del(`/api/chat?action=delete_message&id=${id}`);
  messages = messages.filter(m => m.id !== id);
  document.getElementById('msg-'+id)?.remove();
  Toast.ok('Pesan dihapus');
}

async function regenMsg(id) {
  if (isStreaming) return;
  const msgIdx = messages.findIndex(m => m.id === id);
  if (msgIdx < 0) return;
  // Find the user message before this AI response
  const userMsg = messages.slice(0, msgIdx).reverse().find(m => m.role === 'user');
  if (!userMsg) return;
  // Remove this AI response
  messages.splice(msgIdx, 1);
  document.getElementById('msg-'+id)?.remove();
  // Re-send
  const ta = document.getElementById('chat-ta');
  ta.value = userMsg.content;
  messages = messages.slice(0, messages.findIndex(m => m.id === userMsg.id));
  document.getElementById('msg-'+userMsg.id)?.remove();
  ta.value = userMsg.content;
  await sendMsg();
}

/* ═══════════════ MODEL ═══════════════ */
function setModel(id) {
  currentModel = id;
  const m = KZ.models.find(x => x.id === id) || KZ.models[0];
  document.getElementById('mpt-ico').textContent = m.icon;
  document.getElementById('mpt-name').textContent = m.name;
  document.getElementById('msb-ico').textContent = m.icon;
  document.getElementById('msb-name').textContent = m.name;
  renderModelPicker(Auth.getUser());
}

function renderModelPicker(user) {
  const plan = user?.effective_plan || user?.plan || 'free';
  const ranks = { free:0, premium:1, vip:2 };
  document.getElementById('model-pick-grid').innerHTML = KZ.models.map(m => {
    const locked = ranks[m.plan] > ranks[plan];
    const sel = m.id === currentModel;
    return `<div class="mpk${sel?' sel':''}${locked?' locked':''}"
      onclick="${locked?`Modal.close('model-modal');requirePlan('${m.plan}','${m.name}')`:``}"
      ${!locked?`data-mid="${m.id}"`:''}
      ${!locked?`role="button"`:''}>
      <div class="mpk-top">
        <span class="mpk-ico">${m.icon}</span>
        <span class="badge ${KZ.plans[m.plan].badge}">${KZ.plans[m.plan].icon} ${KZ.plans[m.plan].name}</span>
      </div>
      <div class="mpk-name">${m.name}</div>
      <div class="mpk-prov">${m.provider}</div>
      <div class="mpk-desc">${m.desc}</div>
      <span class="model-tag tag-${m.speed}">${m.speed}</span>
    </div>`;
  }).join('');

  document.querySelectorAll('.mpk[data-mid]').forEach(el => {
    el.addEventListener('click', () => {
      setModel(el.dataset.mid);
      Modal.close('model-modal');
      if (currentSession) API.put(`/api/chat?action=update_session&id=${currentSession.id}`,{model_id:el.dataset.mid});
    });
  });
}

/* ═══════════════ PROMPT TEMPLATES ═══════════════ */
function renderPromptTemplates() {
  const cats = ['Semua', ...new Set(PROMPT_TEMPLATES.map(p => p.cat))];
  document.getElementById('prompt-cats').innerHTML = cats.map(c =>
    `<button class="prompt-cat${c==='Semua'?' active':''}" onclick="filterPromptCat('${c}')">${c}</button>`
  ).join('');
  renderPromptList('Semua');
}

function filterPromptCat(cat) {
  activePCat = cat;
  document.querySelectorAll('.prompt-cat').forEach(el => el.classList.toggle('active', el.textContent === cat));
  renderPromptList(cat);
}

function renderPromptList(cat) {
  const list = cat === 'Semua' ? PROMPT_TEMPLATES : PROMPT_TEMPLATES.filter(p => p.cat === cat);
  document.getElementById('prompts-list').innerHTML = list.map(p =>
    `<div class="prompt-item" onclick="usePromptTemplate('${p.text.replace(/'/g,"\\'").replace(/\n/g,'\\n')}')">
      <div class="prompt-title">${p.title}</div>
      <div class="prompt-text">${p.text.replace(/\n/g,' ')}</div>
    </div>`).join('');
}

function usePromptTemplate(text) {
  const ta = document.getElementById('chat-ta');
  ta.value = text.replace(/\\n/g,'\n');
  autoResize(ta);
  updateCharCnt();
  ta.focus();
  Modal.close('tmpl-modal');
}

/* ═══════════════ EXPORT ═══════════════ */
function exportChat(fmt) {
  if (!messages.length) { Toast.warn('Tidak ada pesan untuk diekspor'); return; }
  const sessionTitle = currentSession?.title || 'Chat';
  if (fmt === 'txt') {
    let txt = `KizAi — ${sessionTitle}\nDiekspor: ${Format.datetime(new Date())}\n${'='.repeat(60)}\n\n`;
    messages.forEach(m => {
      const who = m.role === 'user' ? (Auth.getUser()?.username || 'Kamu') : `AI (${m.model_id || currentModel})`;
      txt += `[${Format.datetime(m.created_at)}] ${who}:\n${m.content}\n\n`;
    });
    downloadFile(txt, `kizai-${sessionTitle}.txt`, 'text/plain');
  } else {
    const json = JSON.stringify({ session: currentSession, messages, exported_at: new Date() }, null, 2);
    downloadFile(json, `kizai-${sessionTitle}.json`, 'application/json');
  }
  Toast.ok('Chat diekspor!');
}

function copyAllChat() {
  const txt = messages.map(m => `${m.role === 'user' ? 'Kamu' : 'AI'}: ${m.content}`).join('\n\n');
  Clipboard.copy(txt, 'Semua chat disalin!');
}

function downloadFile(content, name, type) {
  const blob = new Blob([content], { type });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ═══════════════ INPUT HELPERS ═══════════════ */
function handleTaKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 220) + 'px';
}

function updateCharCnt() {
  const ta = document.getElementById('chat-ta');
  const cnt = document.getElementById('char-cnt');
  const len = ta.value.length;
  cnt.textContent = `${len} / ${CHAR_LIMIT}`;
  cnt.className = 'char-cnt' + (len > CHAR_LIMIT ? ' over' : len > CHAR_LIMIT * .8 ? ' warn' : '');
}

function clearInput() {
  const ta = document.getElementById('chat-ta');
  ta.value = '';
  autoResize(ta);
  updateCharCnt();
  ta.focus();
}

/* ═══════════════ FILE UPLOAD ═══════════════ */
let attachedFile = null;

function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { Toast.warn('File max 5MB'); return; }

  const reader = new FileReader();
  reader.onload = (e) => {
    attachedFile = { name: file.name, type: file.type, data: e.target.result, size: file.size };
    // Show attachment preview
    let preview = document.getElementById('attach-preview');
    if (!preview) {
      preview = document.createElement('div');
      preview.id = 'attach-preview';
      preview.style.cssText = 'display:flex;align-items:center;gap:.5rem;padding:.4rem .75rem;background:var(--bg3);border-radius:var(--r2);margin:.4rem 0;font-size:.8rem';
      const inputCard = document.querySelector('.input-card');
      if (inputCard) inputCard.insertBefore(preview, inputCard.firstChild);
    }
    const isImg = file.type.startsWith('image/');
    preview.innerHTML = `
      ${isImg ? `<img src="${e.target.result}" style="width:36px;height:36px;border-radius:6px;object-fit:cover">` : '📄'}
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${file.name}</span>
      <span style="color:var(--gray2);font-size:.72rem">${(file.size/1024).toFixed(0)}KB</span>
      <button onclick="clearAttachment()" style="background:none;border:none;color:var(--hot);cursor:pointer;padding:0">✕</button>`;
  };
  if (file.type.startsWith('image/')) reader.readAsDataURL(file);
  else reader.readAsText(file);
  input.value = '';
}

function clearAttachment() {
  attachedFile = null;
  const preview = document.getElementById('attach-preview');
  if (preview) preview.remove();
}

function startVoice() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    Toast.warn('Browser tidak mendukung voice input'); return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = 'id-ID'; rec.continuous = false; rec.interimResults = false;
  rec.onresult = e => {
    const ta = document.getElementById('chat-ta');
    ta.value += (ta.value ? ' ' : '') + e.results[0][0].transcript;
    autoResize(ta); updateCharCnt();
  };
  rec.onerror = (e) => {
    const msgs = {
      'not-allowed': 'Izin mikrofon ditolak. Aktifkan di pengaturan browser.',
      'no-speech': 'Tidak ada suara terdeteksi. Coba lagi.',
      'network': 'Koneksi bermasalah untuk voice input.',
    };
    Toast.err(msgs[e.error] || 'Voice input gagal: ' + e.error);
  };
  rec.start();
  Toast.info('🎤 Mendengarkan... (bicara sekarang)');
}

/* ═══════════════ SIDEBAR ═══════════════ */
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sb-overlay');
  if (window.innerWidth < 900) {
    sb.classList.toggle('open');
    ov.classList.toggle('show', sb.classList.contains('open'));
  } else {
    const layout = document.querySelector('.chat-layout');
    if (layout.style.gridTemplateColumns === '1fr') {
      layout.style.gridTemplateColumns = '280px 1fr';
    } else {
      layout.style.gridTemplateColumns = '1fr';
    }
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('show');
}

function setupResize() {
  const ro = new ResizeObserver(() => {
    if (window.innerWidth < 900) {
      document.querySelector('.chat-layout').style.gridTemplateColumns = '1fr';
    }
  });
  ro.observe(document.body);
}

/* DATE HELPERS */
function isToday(d) { return new Date(d).toDateString() === new Date().toDateString(); }
function isYesterday(d) { const y = new Date(); y.setDate(y.getDate()-1); return new Date(d).toDateString() === y.toDateString(); }
function isThisWeek(d) { return (Date.now() - new Date(d)) < 7*86400000; }
