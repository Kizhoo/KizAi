<!DOCTYPE html>
<html lang="id" data-theme="dark" data-accent="blue">
<head>
<script>(function(){var p=JSON.parse(localStorage.getItem('kizai_prefs')||'{}');document.documentElement.setAttribute('data-theme',p.theme||'dark')}())</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login — KizAi</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:var(--bg)}
.login-box{width:100%;max-width:400px}
.login-header{text-align:center;margin-bottom:2rem}
.login-icon{font-size:3rem;margin-bottom:.75rem;display:block}
.login-title{font-family:var(--ff-display);font-weight:800;font-size:1.8rem;letter-spacing:-.04em;margin-bottom:.4rem}
.login-sub{font-size:.85rem;color:var(--gray)}
.login-card{background:var(--card2);border:1px solid var(--bd2);border-radius:var(--r5);padding:2rem}
.bg-orb1{position:fixed;width:600px;height:600px;border-radius:50%;background:rgba(var(--hot-rgb),.04);filter:blur(80px);top:-200px;right:-200px;pointer-events:none}
.bg-orb2{position:fixed;width:500px;height:500px;border-radius:50%;background:rgba(var(--accent-rgb),.04);filter:blur(80px);bottom:-200px;left:-200px;pointer-events:none}
</style>
</head>
<body>
<div id="toast-stack"></div>
<div class="bg-orb1"></div>
<div class="bg-orb2"></div>
<div class="login-box">
  <div class="login-header">
    <span class="login-icon">⚡</span>
    <div class="login-title"><span style="color:var(--accent)">Kiz</span>Ai Admin</div>
    <div class="login-sub">Akses terbatas untuk administrator</div>
  </div>
  <div class="login-card">
    <div class="flex-col gap-4">
      <div class="form-group">
        <label class="form-label">Email Admin</label>
        <input class="input" type="email" id="admin-email" placeholder="admin@kizai.id" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative">
          <input class="input" type="password" id="admin-pw" placeholder="Password admin" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAdminLogin()">
          <button onclick="togglePw('admin-pw')" style="position:absolute;right:.85rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray);cursor:pointer;font-size:.85rem">👁️</button>
        </div>
      </div>
      <button class="btn btn-primary btn-lg w-full" id="login-btn" onclick="doAdminLogin()" style="justify-content:center">
        <span id="btn-text">⚡ Masuk ke Admin</span>
      </button>
      <a href="/" style="text-align:center;font-size:.82rem;color:var(--gray);display:block">← Kembali ke Website</a>
    </div>
  </div>
  <div style="text-align:center;margin-top:1.5rem;font-family:var(--ff-mono);font-size:.62rem;color:var(--gray2)">
    🔒 Halaman ini hanya untuk administrator KizAi
  </div>
</div>
<script src="/shared.js"></script>
<script>
if (Auth.isLoggedIn()) {
  const user = Auth.getUser();
  if (user?.role === 'admin') { location.href = '/admin'; }
}
function togglePw(id) { const el = document.getElementById(id); el.type = el.type === 'password' ? 'text' : 'password'; }
async function doAdminLogin() {
  const email = document.getElementById('admin-email').value.trim();
  const pw = document.getElementById('admin-pw').value;
  if (!email || !pw) { Toast.warn('Isi email dan password'); return; }
  const btn = document.getElementById('login-btn');
  const txt = document.getElementById('btn-text');
  btn.disabled = true;
  txt.innerHTML = '<span style="display:flex;align-items:center;gap:.4rem;justify-content:center"><span class="spinner spinner-sm"></span>Memverifikasi...</span>';
  const { data, ok, error } = await API.post('/.netlify/functions/auth?action=login', { identifier: email, password: pw });
  if (!ok || data?.user?.role !== 'admin') {
    btn.disabled = false;
    txt.textContent = '⚡ Masuk ke Admin';
    Toast.err(error || 'Akses ditolak — bukan admin');
    return;
  }
  Store.set('token', data.access_token);
  Store.set('user', data.user);
  Toast.ok('Login admin berhasil!');
  setTimeout(() => location.href = '/admin', 800);
}
</script>
</body>
</html>
