<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Games Hub — KizAi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080E;--bg2:#0D0D14;--bg3:#12121A;--card:#161621;--card2:#1C1C28;--lime:#D4FF47;--lime2:#BFEF2A;--hot:#FF3C68;--cyan:#00D9FF;--violet:#7B5EA7;--indigo:#5B5FEE;--amber:#FFB830;--green:#2ECC71;--white:#F4F4FF;--gray:#9898B0;--gray2:#5A5A70;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);--ff-d:'Syne',sans-serif;--ff-b:'Plus Jakarta Sans',sans-serif;--ff-m:'JetBrains Mono',monospace}
*,::before,::after{box-sizing:border-box;margin:0;padding:0}html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--white);font-family:var(--ff-b);min-height:100vh}
a{color:inherit;text-decoration:none}
nav{background:rgba(8,8,14,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 5vw;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-family:var(--ff-d);font-weight:800;font-size:1.1rem;display:flex;align-items:center;gap:.4rem}
.brand-dot{width:7px;height:7px;background:var(--lime);border-radius:50%}
.nav-r{display:flex;align-items:center;gap:.6rem}
.coin-badge{display:flex;align-items:center;gap:.35rem;padding:.3rem .75rem;border-radius:7px;background:rgba(255,184,48,.08);border:1px solid rgba(255,184,48,.2);font-family:var(--ff-m);font-size:.75rem;color:var(--amber)}
.nbtn{padding:.38rem .9rem;border-radius:7px;font-size:.8rem;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--gray);font-family:inherit;transition:all .2s}
.nbtn:hover{color:var(--white)}.nbtn.lime{background:var(--lime);color:var(--bg);border-color:var(--lime)}
.hero{padding:3rem 5vw 2rem;border-bottom:1px solid var(--border)}
.hero-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1.5rem}
.h-tag{font-family:var(--ff-m);font-size:.65rem;color:var(--lime);text-transform:uppercase;letter-spacing:.15em;margin-bottom:.5rem}
.h-title{font-family:var(--ff-d);font-weight:800;font-size:clamp(2.2rem,5vw,3.5rem);letter-spacing:-.05em;line-height:.95;margin-bottom:.5rem}
.h-title em{font-style:normal;color:var(--lime)}
.h-sub{color:var(--gray);font-size:.85rem}
.score-strip{display:flex;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:12px;overflow:hidden;flex-shrink:0}
.sc{background:var(--card2);padding:1rem 1.25rem;text-align:center;min-width:88px}
.sc-n{font-family:var(--ff-d);font-weight:800;font-size:1.4rem;letter-spacing:-.04em}
.sc-l{font-size:.6rem;color:var(--gray2);text-transform:uppercase;letter-spacing:.07em;margin-top:.15rem;font-family:var(--ff-m)}
.main{max-width:1200px;margin:0 auto;padding:1.75rem 5vw 5rem}
.filter-bar{display:flex;gap:.4rem;margin-bottom:1.75rem;overflow-x:auto;padding-bottom:.3rem;-webkit-overflow-scrolling:touch}
.filter-bar::-webkit-scrollbar{height:2px}
.fbtn{padding:.38rem .95rem;border-radius:7px;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--gray);font-family:inherit;transition:all .2s;white-space:nowrap;flex-shrink:0}
.fbtn.on{background:var(--lime);color:var(--bg);border-color:var(--lime)}
.fbtn:hover:not(.on){border-color:var(--border2);color:var(--white)}
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.8rem}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.4rem;cursor:pointer;transition:all .28s;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;text-align:center}
.gcard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--lime);transform:scaleX(0);transition:transform .28s;transform-origin:left}
.gcard:hover{border-color:var(--border2);background:var(--card2);transform:translateY(-3px);box-shadow:0 14px 36px rgba(0,0,0,.4)}
.gcard:hover::after{transform:scaleX(1)}
.gc-n{position:absolute;top:.55rem;right:.65rem;font-family:var(--ff-m);font-size:.57rem;color:var(--gray2)}
.gc-e{font-size:2.1rem;margin-bottom:.7rem;line-height:1;display:block}
.gc-name{font-family:var(--ff-d);font-weight:700;font-size:.88rem;letter-spacing:-.02em;margin-bottom:.2rem}
.gc-desc{font-size:.69rem;color:var(--gray);line-height:1.45;margin-bottom:.7rem}
.gc-meta{display:flex;justify-content:space-between;align-items:center;width:100%;margin-top:auto}
.gc-hs{font-family:var(--ff-m);font-size:.58rem;color:var(--gray2)}
.gc-play{padding:.28rem .65rem;border-radius:5px;background:var(--lime);color:var(--bg);font-size:.65rem;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:background .2s}
.gc-play:hover{background:var(--lime2)}
/* MODAL */
.modal{position:fixed;inset:0;background:rgba(8,8,14,.94);backdrop-filter:blur(16px);z-index:500;display:none;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto}
.modal.open{display:flex}.gm-box{background:var(--card);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:520px;margin:auto;animation:pop .3s cubic-bezier(.34,1.56,.64,1)}
.gm-head{padding:1.1rem 1.4rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.gm-title{font-family:var(--ff-d);font-weight:700;font-size:1.1rem;letter-spacing:-.02em;display:flex;align-items:center;gap:.45rem}
.gm-close{background:none;border:none;color:var(--gray);font-size:1.3rem;cursor:pointer;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:7px;transition:all .2s}
.gm-close:hover{background:rgba(255,255,255,.06);color:var(--white)}
.gm-body{padding:1.4rem}
.gm-stats{display:flex;gap:1px;background:var(--border);border-radius:9px;overflow:hidden;margin-bottom:1.1rem}
.gs{background:var(--bg3);padding:.65rem;text-align:center;flex:1}
.gs-v{font-family:var(--ff-m);font-weight:700;font-size:.95rem;color:var(--lime)}
.gs-l{font-size:.58rem;color:var(--gray2);margin-top:.1rem;text-transform:uppercase;letter-spacing:.06em}
.gbtn{padding:.6rem 1.15rem;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
.gbtn.p{background:var(--lime);color:var(--bg)}.gbtn.p:hover{background:var(--lime2)}
.gbtn.g{background:var(--card2);color:var(--white);border:1px solid var(--border2)}.gbtn.g:hover{border-color:rgba(255,255,255,.25)}
.gbtn.d{background:rgba(255,60,104,.1);color:var(--hot);border:1px solid rgba(255,60,104,.2)}
.g-st{text-align:center;font-weight:600;font-size:.88rem;margin:.6rem 0;color:var(--gray);min-height:1.4rem}
/* GAME SPECIFIC */
canvas.gc-cv{display:block;margin:0 auto;border-radius:10px;border:1px solid var(--border2);max-width:100%}
.ttt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:.85rem 0}
.ttt-cell{aspect-ratio:1;background:var(--bg3);border:2px solid var(--border);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;cursor:pointer;transition:all .2s;user-select:none}
.ttt-cell:hover:not(.taken){background:var(--card2)}.ttt-cell.xc{color:#F87171;border-color:rgba(248,113,113,.3)}.ttt-cell.oc{color:#60A5FA;border-color:rgba(96,165,250,.3)}.ttt-cell.win{background:rgba(212,255,71,.12);border-color:rgba(212,255,71,.4)!important}
.c4-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:var(--indigo);padding:6px;border-radius:10px;margin:.85rem 0}
.c4-cell{aspect-ratio:1;border-radius:50%;background:var(--bg3);cursor:pointer;transition:background .15s}.c4-cell:hover{background:rgba(255,255,255,.08)}.c4-cell.red{background:#F87171}.c4-cell.yellow{background:#FDE047}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.45rem;margin:.85rem 0}
.mem-card{aspect-ratio:1;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:all .28s;user-select:none;border:2px solid var(--border)}
.mem-card.fd{background:linear-gradient(135deg,var(--indigo),var(--violet))}.mem-card.fu{background:var(--bg3)}.mem-card.mt{background:rgba(212,255,71,.06);border-color:rgba(212,255,71,.3);opacity:.55;cursor:default}
.t48-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;background:var(--card2);padding:7px;border-radius:11px;margin:.85rem auto;max-width:280px}
.t48c{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--ff-d);font-weight:800;font-size:.85rem;transition:all .1s}
.t48c[d="0"]{background:var(--bg3);color:transparent}.t48c[d="2"]{background:#EEE4DA;color:#776E65}.t48c[d="4"]{background:#EDE0C8;color:#776E65}.t48c[d="8"]{background:#F2B179;color:#fff}.t48c[d="16"]{background:#F59563;color:#fff}.t48c[d="32"]{background:#F67C5F;color:#fff}.t48c[d="64"]{background:#F65E3B;color:#fff}.t48c[d="128"]{background:#EDCF72;color:#fff}.t48c[d="256"]{background:#EDCC61;color:#fff}.t48c[d="512"]{background:#EDC850;color:#fff}.t48c[d="1024"]{background:var(--lime);color:var(--bg);font-size:.75rem}.t48c[d="2048"]{background:var(--lime2);color:var(--bg);font-size:.7rem;animation:cel .5s}
@keyframes cel{50%{transform:scale(1.1)}}
.wg-board{display:flex;flex-direction:column;gap:.35rem;margin:.85rem 0}
.wg-row{display:flex;gap:.35rem;justify-content:center}
.wg-cell{width:40px;height:40px;border:2px solid var(--border2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--ff-m);font-weight:700;font-size:.95rem;text-transform:uppercase;transition:all .28s}
.wg-cell.cc{background:rgba(46,204,113,.25);border-color:var(--green)}.wg-cell.pr{background:rgba(255,184,48,.2);border-color:var(--amber)}.wg-cell.ab{background:rgba(255,255,255,.04);border-color:var(--border);color:var(--gray2)}.wg-cell.cur{border-color:rgba(255,255,255,.35)}
.wg-kb{display:flex;flex-direction:column;gap:.3rem;margin-top:.65rem;align-items:center}
.wg-kr{display:flex;gap:.28rem}
.wg-k{width:28px;height:34px;border-radius:5px;background:var(--card2);border:1px solid var(--border);color:var(--white);font-size:.68rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center}
.wg-k.wide{width:44px;font-size:.6rem}.wg-k.cc{background:rgba(46,204,113,.2);border-color:var(--green)}.wg-k.pr{background:rgba(255,184,48,.15);border-color:var(--amber)}.wg-k.ab{background:rgba(255,255,255,.03);color:var(--gray2)}
.hm-svg{display:block;margin:0 auto;width:110px;height:90px}
.hm-word{display:flex;gap:.35rem;justify-content:center;margin:.65rem 0}
.hm-lt{width:30px;height:38px;border-bottom:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--ff-m);font-size:1.1rem;font-weight:700}
.hm-letters{display:flex;flex-wrap:wrap;gap:.28rem;justify-content:center;margin-top:.65rem}
.hm-btn{width:32px;height:32px;border-radius:6px;background:var(--card2);border:1px solid var(--border);color:var(--white);font-size:.75rem;font-weight:700;cursor:pointer;font-family:var(--ff-m);transition:all .2s}
.hm-btn:hover:not(:disabled){background:var(--indigo);border-color:var(--indigo)}.hm-btn.wrong{background:rgba(255,60,104,.1);color:var(--hot);border-color:rgba(255,60,104,.2)}.hm-btn.right{background:rgba(46,204,113,.12);color:var(--green);border-color:rgba(46,204,113,.2)}.hm-btn:disabled{opacity:.35;cursor:not-allowed}
.ms-grid{display:grid;gap:2px;margin:.85rem auto;max-width:100%;overflow-x:auto}
.ms-cell{width:26px;height:26px;min-width:26px;border-radius:3px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;cursor:pointer;font-family:var(--ff-m);user-select:none;transition:background .12s}
.ms-cell:hover:not(.rv):not(.fg){background:var(--bg2)}.ms-cell.rv{background:var(--bg3);cursor:default}.ms-cell.fg{background:rgba(255,60,104,.1);color:var(--hot)}.ms-cell.mine{background:rgba(255,60,104,.2);color:var(--hot)}
.ms-cell[dn="1"]{color:#3B82F6}.ms-cell[dn="2"]{color:#2ECC71}.ms-cell[dn="3"]{color:var(--hot)}.ms-cell[dn="4"]{color:var(--violet)}.ms-cell[dn="5"]{color:var(--amber)}
.slot-reels{display:flex;gap:.65rem;justify-content:center;margin:1rem 0}
.slot-reel{width:74px;height:74px;background:var(--bg3);border:2px solid var(--border2);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:2rem;overflow:hidden}
.slot-reel.sp{animation:spn .55s ease}.@keyframes spn{50%{transform:scaleY(0)}}
.bj-tbl{background:rgba(46,204,113,.04);border:1px solid rgba(46,204,113,.12);border-radius:11px;padding:1.1rem;margin:.85rem 0}
.bj-lbl{font-family:var(--ff-m);font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--gray2);margin-bottom:.4rem}
.bj-cards{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.35rem;min-height:55px}
.bj-card{width:40px;height:56px;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#1a1a2e;box-shadow:0 2px 6px rgba(0,0,0,.3);flex-direction:column;line-height:1.2;flex-shrink:0}
.bj-card.rd{color:#c0392b}.bj-card.hid{background:linear-gradient(135deg,var(--indigo),var(--violet));color:transparent}
.bj-tot{font-family:var(--ff-m);font-size:.7rem;color:var(--gray)}
.rps-opts{display:flex;gap:.65rem;justify-content:center;margin:1rem 0}
.rps-btn{width:68px;height:68px;border-radius:50%;background:var(--card2);border:2px solid var(--border);font-size:1.85rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.rps-btn:hover{border-color:var(--lime);transform:scale(1.08)}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin:.85rem 0}
.opt-b{padding:.8rem;border-radius:8px;background:var(--card2);border:2px solid var(--border);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;color:var(--white);font-family:inherit;text-align:center;line-height:1.4}
.opt-b:hover:not(:disabled){border-color:var(--border2)}.opt-b.cc{border-color:var(--green);background:rgba(46,204,113,.12);color:var(--green)}.opt-b.ww{border-color:var(--hot);background:rgba(255,60,104,.1);color:var(--hot)}
.rxn-box{width:100%;height:110px;border-radius:11px;background:var(--card2);border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:600;color:var(--gray);transition:all .2s;margin:.85rem 0;user-select:none}
.big-txt{font-family:var(--ff-d);font-weight:800;font-size:2.5rem;text-align:center;letter-spacing:-.05em;color:var(--lime);margin:.85rem 0;line-height:1}
.big-e{font-size:4.5rem;text-align:center;display:block;margin:.85rem auto;cursor:pointer;line-height:1;transition:transform .28s}.big-e:hover{transform:scale(1.1)}
.rpm-inp{width:100%;padding:.72rem 1rem;background:var(--bg3);border:1.5px solid var(--border);border-radius:9px;color:var(--white);font-size:.88rem;font-family:inherit;outline:none;transition:border-color .2s;margin-bottom:.65rem}
.rpm-inp:focus{border-color:rgba(212,255,71,.4)}
.simon-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;max-width:180px;margin:.65rem auto}
.simon-btn{aspect-ratio:1;border-radius:10px;cursor:pointer;transition:opacity .15s;opacity:.4;border:none}
.simon-btn.on{opacity:1}
.su-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:1px;background:var(--indigo);padding:2px;border-radius:8px;margin:.85rem auto;max-width:290px;border:2px solid var(--indigo)}
.su-cell{aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:var(--ff-m);font-size:.75rem;font-weight:700;cursor:pointer;border:none}
.su-cell:nth-child(3n){border-right:2px solid var(--indigo)}.su-cell:nth-child(n+19):nth-child(-n+27),.su-cell:nth-child(n+46):nth-child(-n+54){border-bottom:2px solid var(--indigo)}
.su-cell:hover:not(.gv){background:rgba(212,255,71,.05)}.su-cell.on{background:rgba(212,255,71,.1);color:var(--lime)}.su-cell.gv{cursor:default}.su-cell.uv{color:var(--cyan)}.su-cell.er{color:var(--hot)}
.tw-cv{display:block;margin:0 auto}
#sc-area{width:100%;height:130px;background:var(--card2);border:2px solid var(--border);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:.95rem;color:var(--gray);cursor:pointer;margin:.85rem 0;user-select:none;position:relative;overflow:hidden}
#sc-bar{position:absolute;bottom:0;left:0;height:3px;background:var(--lime);width:100%;transition:width .1s linear}
.tp-text{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:.9rem 1rem;font-size:.82rem;line-height:1.8;margin-bottom:.65rem;min-height:72px;font-family:var(--ff-m)}
.tp-txt-char{transition:all .15s}.tp-txt-char.done{color:var(--green)}.tp-txt-char.err{color:var(--hot);background:rgba(255,60,104,.1)}.tp-txt-char.cur{border-bottom:2px solid var(--lime)}
.wheel-cv{display:block;margin:0 auto;border-radius:50%;cursor:pointer}
.toast-stack{position:fixed;top:.7rem;right:.7rem;z-index:999;display:flex;flex-direction:column;gap:.35rem}
.toast{padding:.6rem .95rem;border-radius:8px;font-size:.78rem;font-weight:600;animation:tin .3s;display:flex;align-items:center;gap:.35rem;box-shadow:0 8px 20px rgba(0,0,0,.5)}
.toast.ok{background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.25);color:#2ECC71}
.toast.err{background:rgba(255,60,104,.1);border:1px solid rgba(255,60,104,.25);color:var(--hot)}
.toast.info{background:rgba(212,255,71,.07);border:1px solid rgba(212,255,71,.2);color:var(--lime)}
@keyframes tin{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
@media(max-width:600px){.ggrid{grid-template-columns:repeat(2,1fr)}.wg-cell{width:34px;height:34px;font-size:.85rem}}
@media(max-width:380px){.ggrid{grid-template-columns:repeat(2,1fr);gap:.5rem}.gcard{padding:1rem}.gc-e{font-size:1.8rem}}
</style>
</head>
<body>
<div class="toast-stack" id="toasts"></div>
<nav>
  <a href="/" class="brand"><span class="brand-dot"></span>KizAi</a>
  <div class="nav-r">
    <div class="coin-badge">💰 <span id="hd-coins">0</span></div>
    <button class="nbtn" onclick="location.href='/dashboard.html'">Dashboard</button>
    <button class="nbtn lime" onclick="location.href='/checkout.html'">Upgrade</button>
  </div>
</nav>
<div class="hero">
  <div class="hero-inner">
    <div>
      <div class="h-tag">// Games Hub</div>
      <div class="h-title"><em>52+</em> Games<br>Playable.</div>
      <div class="h-sub">Semua langsung di browser. Kumpulkan koin, kalahkan high score!</div>
    </div>
    <div class="score-strip">
      <div class="sc"><div class="sc-n" style="color:var(--amber)" id="hd-c">0</div><div class="sc-l">Koin</div></div>
      <div class="sc"><div class="sc-n" style="color:var(--lime)" id="hd-p">0</div><div class="sc-l">Dimainkan</div></div>
      <div class="sc"><div class="sc-n" style="color:var(--cyan)" id="hd-s">0</div><div class="sc-l">Streak</div></div>
    </div>
  </div>
</div>
<div class="main">
  <div class="filter-bar" id="fbar"></div>
  <div class="ggrid" id="ggrid"></div>
</div>
<div class="modal" id="gmodal" onclick="if(event.target===this)closeGame()">
  <div class="gm-box" id="gmbox"></div>
</div>
<script>
// ── STATE ──
let GS=JSON.parse(localStorage.getItem('kizai_gs')||'{"coins":100,"played":0,"streak":0,"scores":{}}');
function saveGS(){localStorage.setItem('kizai_gs',JSON.stringify(GS))}

let tttB,tttAI=true,tttW={w:0,l:0,d:0};const WL=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function initTTT(){tttB=Array(9).fill('');renderTTT();_('ttt_st','Giliranmu (❌)')}
function renderTTT(){const b=document.getElementById('ttt_board');if(!b)return;b.innerHTML=tttB.map((c,i)=>`<div class="ttt-cell${c?' taken':''} ${c==='X'?'xc':'oc'}" onclick="tttClick(${i})">${c==='X'?'❌':c==='O'?'⭕':''}</div>`).join('')}
function tttClick(i){if(tttB[i]||checkTW(tttB))return;tttB[i]='X';renderTTT();let w=checkTW(tttB);if(w){hlTTT(w);_('ttt_st','🎉 Kamu Menang! +15🪙');tttW.w++;addCoins(15);updTTTR();return}if(tttB.every(c=>c)){_('ttt_st','🤝 Seri! +5🪙');addCoins(5);tttW.d++;updTTTR();return}if(tttAI)setTimeout(aiTTT,350)}
function aiTTT(){let best=-Infinity,mv=null;tttB.forEach((c,i)=>{if(!c){tttB[i]='O';const s=mmTTT(tttB,0,false);tttB[i]='';if(s>best){best=s;mv=i}}});if(mv!==null)tttB[mv]='O';renderTTT();let w=checkTW(tttB);if(w){hlTTT(w);_('ttt_st','😢 AI Menang!');tttW.l++;addCoins(-5);updTTTR()}else if(tttB.every(c=>c)){_('ttt_st','🤝 Seri! +5🪙');addCoins(5);tttW.d++;updTTTR()}else _('ttt_st','Giliranmu (❌)')}
function mmTTT(b,d,mx){const w=checkTW(b);if(w)return mx?d-10:10-d;if(b.every(c=>c))return 0;if(mx){let v=-Infinity;b.forEach((c,i)=>{if(!c){b[i]='X';v=Math.max(v,mmTTT(b,d+1,false));b[i]=''}});return v}else{let v=Infinity;b.forEach((c,i)=>{if(!c){b[i]='O';v=Math.min(v,mmTTT(b,d+1,true));b[i]=''}});return v}}
function checkTW(b){return WL.find(([a,c,e])=>b[a]&&b[a]===b[c]&&b[a]===b[e])||null}
function hlTTT(l){l.forEach(i=>{const c=document.querySelectorAll('.ttt-cell')[i];if(c)c.classList.add('win')})}
function updTTTR(){_('gs_Rekord',`W:${tttW.w} L:${tttW.l} D:${tttW.d}`)}
function tttToggle(){tttAI=!tttAI;initTTT()}

let snkS,snkF,snkD,snkND,snkSc=0,snkB=0,snkPaused=false;const SZ=20,SC=14;
function startSnake(){if(window._snkL)clearInterval(window._snkL);snkS=[{x:7,y:7},{x:6,y:7},{x:5,y:7}];snkD={x:1,y:0};snkND={x:1,y:0};snkSc=0;snkPaused=false;plSnkF();window._snkL=addL(snkLoop,110);}
function plSnkF(){snkF={x:~~(Math.random()*SC),y:~~(Math.random()*SC)}}
function snkD(x,y){if(!(x===-snkD.x&&y===-snkD.y))snkND={x,y}}
function snkPause(){snkPaused=!snkPaused}
function snkLoop(){if(snkPaused)return;snkD=snkND;const h={x:snkS[0].x+snkD.x,y:snkS[0].y+snkD.y};if(h.x<0||h.x>=SC||h.y<0||h.y>=SC||snkS.some(s=>s.x===h.x&&s.y===h.y)){clearInterval(window._snkL);if(snkSc>snkB)snkB=snkSc;GS.scores.snake=snkB;saveGS();addCoins(~~(snkSc/3));drawSnk(true);return}snkS.unshift(h);if(h.x===snkF.x&&h.y===snkF.y){snkSc+=10;plSnkF();_('gs_Score',snkSc);_('gs_Level',~~(snkSc/50)+1)}else snkS.pop();drawSnk()}
function drawSnk(dead=false){const cv=document.getElementById('snk_cv');if(!cv)return;const ctx=cv.getContext('2d');const W=cv.width/SC;ctx.fillStyle='#12121A';ctx.fillRect(0,0,cv.width,cv.height);ctx.fillStyle=dead?'#F87171':'#D4FF47';snkS.forEach((s,i)=>{ctx.beginPath();ctx.roundRect(s.x*W+1,s.y*W+1,W-2,W-2,i===0?4:3);ctx.fill()});if(snkF){ctx.fillStyle='#FF3C68';ctx.beginPath();ctx.arc(snkF.x*W+W/2,snkF.y*W+W/2,W/2-2,0,Math.PI*2);ctx.fill()}if(dead){ctx.fillStyle='rgba(8,8,14,.75)';ctx.fillRect(0,0,cv.width,cv.height);ctx.fillStyle='#F4F4FF';ctx.font='bold 16px Syne';ctx.textAlign='center';ctx.fillText('Score: '+snkSc,cv.width/2,cv.height/2-10);ctx.font='12px Plus Jakarta Sans';ctx.fillStyle='#9898B0';ctx.fillText('Tekan Mulai',cv.width/2,cv.height/2+12)}}
document.addEventListener('keydown',e=>{if(!document.getElementById('snk_cv'))return;const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};if(m[e.key]){e.preventDefault();snkND=m[e.key]}if(e.key===' ')snkPause()});

let bkBall,bkPad,bkBricks,bkScore=0,bkLives=3,bkRunning=false;
function startBreakout(){const cv=document.getElementById('bk_cv');if(!cv)return;const W=cv.width,H=cv.height;bkScore=0;bkLives=3;bkRunning=true;_('gs_Score',0);_('gs_Lives',3);bkBall={x:W/2,y:H-60,vx:3,vy:-3,r:6};bkPad={x:W/2-30,w:60,h:8,y:H-20,spd:0};bkBricks=[];for(let r=0;r<4;r++)for(let c=0;c<7;c++)bkBricks.push({x:c*38+5,y:r*20+30,w:34,h:14,alive:true,color:['#F87171','#FDE047','#86EFAC','#93C5FD'][r]});
cv.addEventListener('mousemove',e=>{const rect=cv.getBoundingClientRect();bkPad.x=Math.min(W-bkPad.w,(e.clientX-rect.left)*(W/rect.width)-bkPad.w/2)});
cv.addEventListener('touchmove',e=>{e.preventDefault();const rect=cv.getBoundingClientRect();bkPad.x=Math.min(W-bkPad.w,(e.touches[0].clientX-rect.left)*(W/rect.width)-bkPad.w/2)},{passive:false});
function bkLoop(){if(!bkRunning||!document.getElementById('bk_cv'))return;const ctx=cv.getContext('2d');ctx.fillStyle='#12121A';ctx.fillRect(0,0,W,H);bkBall.x+=bkBall.vx;bkBall.y+=bkBall.vy;if(bkBall.x-bkBall.r<0||bkBall.x+bkBall.r>W)bkBall.vx*=-1;if(bkBall.y-bkBall.r<0)bkBall.vy*=-1;if(bkBall.y+bkBall.r>bkPad.y&&bkBall.x>bkPad.x&&bkBall.x<bkPad.x+bkPad.w){bkBall.vy=-Math.abs(bkBall.vy);bkBall.vx=(bkBall.x-(bkPad.x+bkPad.w/2))/12}if(bkBall.y>H){bkLives--;_('gs_Lives',bkLives);if(bkLives<=0){bkRunning=false;GS.scores.breakout=Math.max(bkScore,GS.scores.breakout||0);addCoins(~~(bkScore/5));return}bkBall={x:W/2,y:H-60,vx:3,vy:-3,r:6}}bkBricks.forEach(b=>{if(!b.alive)return;if(bkBall.x>b.x&&bkBall.x<b.x+b.w&&bkBall.y>b.y&&bkBall.y<b.y+b.h){b.alive=false;bkBall.vy*=-1;bkScore+=10;_('gs_Score',bkScore);bkBall.vy=Math.abs(bkBall.vy)*(Math.random()>.5?1:-1)*1}});ctx.fillStyle='#D4FF47';ctx.beginPath();ctx.arc(bkBall.x,bkBall.y,bkBall.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#5B5FEE';ctx.fillRect(bkPad.x,bkPad.y,bkPad.w,bkPad.h);bkBricks.forEach(b=>{if(!b.alive)return;ctx.fillStyle=b.color;ctx.fillRect(b.x+1,b.y+1,b.w-2,b.h-2);});if(bkBricks.every(b=>!b.alive)){bkRunning=false;GS.scores.breakout=Math.max(bkScore,GS.scores.breakout||0);addCoins(50);toast('🎉 Level Clear!','ok')}}_raf=requestAnimationFrame(function loop(){if(bkRunning&&document.getElementById('bk_cv')){bkLoop();_raf=requestAnimationFrame(loop)}});
}

function initSeq(){seqNums=[];seqLevel=0}
function startSeq(){seqLevel++;seqNums=[...Array(seqLevel)].map(()=>~~(Math.random()*9)+1);seqPhase='show';_('seq_st','Hafal urutannya!');_('seq_nums',seqNums.join(' - '));const inp=document.getElementById('seq_inp');if(inp)inp.style.display='none';setTimeout(()=>{_('seq_nums','? ? ?');seqPhase='input';_('seq_st','Ketik urutannya!');if(inp){inp.style.display='';inp.value='';inp.focus()}},2000+seqLevel*500)}
function checkSeq(){const inp=document.getElementById('seq_inp');if(!inp||seqPhase!=='input')return;const v=inp.value.replace(/[^0-9]/g,' ').trim().split(/\s+/).map(Number);const correct=v.every((n,i)=>n===seqNums[i])&&v.length===seqNums.length;if(correct){_('gs_Level',seqLevel);if(seqLevel>seqBest){seqBest=seqLevel;GS.scores.sequence=seqBest;saveGS();_('gs_Best',seqBest)}addCoins(seqLevel*5);toast('✅ Benar! Level '+seqLevel,'ok');setTimeout(startSeq,800)}else{_('gs_Level',1);seqLevel=0;toast('❌ Salah! Ulangi dari awal','err');setTimeout(startSeq,1200)}}
// ════════════════════════════════════════
// WORD CHAIN
// ════════════════════════════════════════
const VALID_WORDS=new Set(['ALAM','MALAM','MALANG','LANGIT','LANGSUNG','SUNGGUH','GULA','LAUT','UTAMA','AMAT','MATANG','TANGGA','GAGAL','GALI','LINGKAR','KARYA','YAKIN','KINI','NILAI','ILMU','MULIA','LIHAT','HATIKU','KUNCI','CINCIN','NIAT','ATUR','TURUN','RUNCING','CINCIN']);
let wcHistory=[],wcScore=0,wcBest=0;
function checkWC(){const inp=document.getElementById('wc_inp');if(!inp)return;const word=inp.value.toUpperCase().trim();if(!word){toast('Ketik kata dulu!','err');return}if(wcHistory.includes(word)){toast('Kata sudah pernah dipakai!','err');return}const last=wcHistory[wcHistory.length-1];if(last&&word[0]!==last[last.length-1]){toast(`Harus mulai dengan huruf "${last[last.length-1]}"!`,'err');return}wcHistory.push(word);wcScore++;_('gs_Score',wcScore);if(wcScore>wcBest){wcBest=wcScore;GS.scores.wordchain=wcBest;saveGS();_('gs_Best',wcBest)}_('wc_history',wcHistory.slice(-4).join(' → '));inp.value='';addCoins(5);toast('+5🪙','ok')}
// ════════════════════════════════════════
// TOAST
// ════════════════════════════════════════
function toast(msg,type='ok'){const w=document.getElementById('toasts');const el=document.createElement('div');el.className='toast '+type;el.textContent=msg;w.appendChild(el);setTimeout(()=>el.remove(),2800)}
</script>
